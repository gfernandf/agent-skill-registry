id: data.parse-and-validate
version: 0.1.0
name: Parse and Validate
description: Parse JSON text and validate it against a schema.
inputs:
  text:
    type: string
    required: true
  schema:
    type: object
    required: true
outputs:
  data:
    type: object
    required: true
  valid:
    type: boolean
    required: true
  errors:
    type: array
    required: false
steps:
- id: parse_json
  uses: data.json.parse
  input:
    text: inputs.text
  output:
    data: outputs.data
- id: validate_schema
  uses: data.schema.validate
  input:
    data: outputs.data
    schema: inputs.schema
  output:
    valid: outputs.valid
    errors: outputs.errors
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: enrich
  tags:
  - data
  - parsing
  - validation
  use_cases:
  - Parse raw JSON data and validate against a schema
  - Ensure incoming data conforms to expected structure
  - Validate API payloads before processing
  examples:
  - description: Parse and validate a JSON payload
    input:
      raw_data: '{"name": "Alice", "age": 30}'
      schema:
        type: object
        required:
        - name
        - age
    output:
      parsed:
        name: Alice
        age: 30
      valid: true
      errors: []
