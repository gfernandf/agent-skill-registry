id: table.filter-summary
version: 0.1.0
name: Filter Table Summary
description: Filter a table and summarize the filtered rows.
inputs:
  table:
    type: array
    required: true
  condition:
    type: object
    required: true
outputs:
  table:
    type: array
    required: true
  summary:
    type: string
    required: true
steps:
- id: filter_table
  uses: table.row.filter
  input:
    table: inputs.table
    condition: inputs.condition
  output:
    table: outputs.table
- id: merge_rows
  uses: text.content.merge
  input:
    items: outputs.table
  output:
    text: vars.merged_rows
- id: summarize_table
  uses: text.content.summarize
  input:
    text: vars.merged_rows
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - table
  - data
  - filtering
  - summarization
  use_cases:
  - Filter tabular data and summarize the results
  - Apply criteria to a dataset and produce a focused summary
  - Extract insights from filtered table records
  examples:
  - description: Filter and summarize tabular data
    input:
      table:
      - name: Alice
        score: 92
      - name: Bob
        score: 78
      filter:
        score:
          '>': 80
    output:
      filtered:
      - name: Alice
        score: 92
      summary: '1 of 2 records match: Alice (score 92).'
      count: 1
