id: email.read-summary
version: 0.1.0
name: Read Email Summary
description: Read emails from a mailbox and summarize their content.
inputs:
  mailbox:
    type: string
    required: true
outputs:
  messages:
    type: array
    required: true
  summary:
    type: string
    required: true
steps:
- id: read_email
  uses: email.inbox.read
  input:
    mailbox: inputs.mailbox
  output:
    messages: outputs.messages
- id: summarize_messages
  uses: text.content.summarize
  input:
    text: outputs.messages
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - email
  - communication
  - messaging
  - summarization
  use_cases:
  - Read emails from inbox and generate summaries
  - Extract action items from email threads
  - Summarize unread emails for quick triage
  examples:
  - description: Read and summarize inbox emails
    input:
      mailbox: inbox
      max_messages: 10
      unread_only: true
    output:
      summary: '3 unread emails: 1 meeting invite for Friday, 1 project update from team lead, 1 vendor proposal.'
      count: 3
