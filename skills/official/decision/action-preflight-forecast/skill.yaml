id: decision.action-preflight-forecast
version: 0.2.1
name: Action Preflight Forecast
description: >
  Execute a structured pre-action deliberation before a consequential action is taken.
  Makes intermediate reasoning explicit by: normalizing intent, modeling the action,
  extracting entities, risks, and uncertainties, forecasting consequences,
  scoring alternatives,
  justifying a strategy, and mapping that strategy to a canonical continuation decision.
  Designed to be naturally calibrated - permissive for low-risk actions, escalating only
  when risk evidence is concrete. Clarification is requested when uncertainty is high
  and the action is not clearly low-risk/safe.
  Pipeline uses zero generic generators at the decision layer. All branching is
  deterministic based on structured signals from risk scoring, uncertainty analysis,
  and strategy confidence.

channel: official
domain: decision
slug: action-preflight-forecast
status: stable

inputs:
  candidate_action:
    type: object
    required: true
    description: >
      The action under consideration. Should include at minimum: type (string), and any
      relevant parameters (target, scope, method, etc.). Sparse inputs are accepted - the
      skill will model and surface implicit assumptions.
  intended_goal:
    type: string
    required: true
    description: >
      The outcome the action is intended to achieve. Used to ground all downstream
      analysis in intent, not just mechanics.
  context:
    type: object
    required: false
    description: >
      Optional operational context: environment state, prior events, active constraints,
      user permissions, session history.
  available_evidence:
    type: array
    required: false
    description: >
      Evidence items that support or challenge assumptions about the action. Each item:
      {id, content, source, reliability_hint}.
  known_constraints:
    type: array
    required: false
    description: >
      Policies, permission boundaries, and operational constraints that apply. Each item:
      {id, description, enforcement: hard|soft}.
  risk_tolerance:
    type: string
    required: false
    description: >
      Risk appetite: low | medium | high. Defaults to medium. Influences how scoring
      weights downside scenarios.
  agent_permissions:
    type: object
    required: false
    description: >
      Active permission set for the executing agent. Used to contextualize whether the
      action is within authorization boundaries.

outputs:
  continuation_decision:
    type: object
    required: true
    description: >
      Final decision object. Fields: decision (string enum), rationale (string),
      confidence_score (number), risk_level (string), risk_score (number),
      affected_entities (array), risks (array), safer_alternatives (array),
      uncertainties (array), action_assumptions (array), and
      explicit_safety_checks (object).
  human_readable:
    type: string
    required: true
    description: >
      Narrative explanation of the preflight reasoning suitable for direct human
      consumption or audit logging.
  action_model:
    type: object
    required: true
    description: >
      Structured model of the candidate action with explicit assumptions and expected
      state change. Intermediate artifact for traceability.
  consequence_forecast:
    type: array
    required: true
    description: >
      Ranked consequence hypotheses with impact scores and confidence per consequence.
      Intermediate artifact for traceability.
  safer_alternatives:
    type: array
    required: true
    description: >
      Scored alternatives to the original action, covering at least 6 structural angles
      (guardrails, staged, alternative path, defer, no-action). Intermediate artifact for
      traceability.

steps:
  - id: build_normalized_request
    uses: data.record.merge
    input:
      records:
        - raw_request: inputs.intended_goal
          language: unknown
          detected_intent: action_preflight
          explicit_constraints: inputs.known_constraints
          urgency: medium
          requires_external_action: true
          attachments: []
      strategy: deep_merge
    output:
      record: vars.normalized_request

  - id: interpret_goal
    uses: reasoning.goal.interpret
    input:
      normalized_request: vars.normalized_request
      context: inputs.context
    output:
      interpreted_goal: vars.interpreted_goal

  - id: build_action_model
    uses: data.record.merge
    input:
      records:
        - inputs.candidate_action
        - intended_goal: inputs.intended_goal
          action_summary: inputs.intended_goal
          interpreted_goal: vars.interpreted_goal
        - known_constraints: inputs.known_constraints
          available_evidence: inputs.available_evidence
          context: inputs.context
          agent_permissions: inputs.agent_permissions
          risk_tolerance: inputs.risk_tolerance
      strategy: deep_merge
    output:
      record: outputs.action_model

  - id: extract_affected_entities
    uses: perception.entity.extract
    input:
      text: inputs.intended_goal
    output:
      entities: vars.affected_entities

  - id: extract_uncertainties
    uses: reasoning.uncertainty.extract
    input:
      target: outputs.action_model
      context: >
        Identify uncertainty explicitly, including ambiguity in scope,
        unknown rollback readiness, missing evidence quality, and
        risk_of_inaction for consequential operations.
    output:
      uncertainties: vars.extracted_uncertainties

  - id: score_uncertainties
    uses: evaluation.uncertainty.score
    input:
      uncertainties: vars.extracted_uncertainties
      scoring_criteria:
        - name: operational_impact
          weight: 0.4
        - name: evidence_gap
          weight: 0.35
        - name: reversibility_gap
          weight: 0.25
    output:
      scored_uncertainties: vars.scored_uncertainties

  - id: classify_uncertainty_level
    uses: reasoning.output.classify
    input:
      output:
        uncertainties: vars.extracted_uncertainties
        scored_uncertainties: vars.scored_uncertainties
      categories:
        - low
        - medium
        - high
      context: >
        Classify operational uncertainty for continuation gating. Mark as high
        when ambiguity, unknown rollback readiness, weak evidence, or
        risk_of_inaction tradeoffs are significant.
    output:
      category: vars.uncertainty_level
      confidence: vars.uncertainty_confidence
      rationale: vars.uncertainty_rationale

  - id: classify_action_risk
    uses: policy.risk.classify
    input:
      action: outputs.action_model
      categories:
        - low
        - medium
        - high
        - critical
    output:
      risk_level: vars.risk_level
      factors: vars.risk_factors
      rationale: vars.risk_rationale

  - id: score_action_risk
    uses: policy.risk.score
    input:
      action: outputs.action_model
      dimensions:
        - data_exposure
        - reversibility
        - blast_radius
        - authorization_compliance
        - regulatory_exposure
    output:
      risk_score: vars.risk_score
      dimension_scores: vars.dimension_scores
      safe: vars.risk_safe

  - id: generate_consequence_hypotheses
    uses: reasoning.option.generate
    input:
      goal: >
        Generate 6 structurally distinct consequence hypotheses for the action. Cover
        these angles: (1) best-case expected outcome, (2) worst-case failure scenario,
        (3) lateral/unintended side effects, (4) cascading downstream effects,
        (5) near-term impact within hours/days, (6) long-term systemic impact.
        Include at least one explicit risk_of_inaction hypothesis.
      context: inputs.intended_goal
      constraints:
        must_cover_angles:
          - best_case
          - worst_case
          - lateral_effects
          - cascading_effects
          - near_term
          - long_term
      max_options: 6
    output:
      options: vars.consequence_hypotheses

  - id: analyze_consequences
    uses: reasoning.option.analyze
    input:
      options: vars.consequence_hypotheses
      context: inputs.intended_goal
      goal: inputs.intended_goal
    output:
      analyzed_options: vars.analyzed_consequences
      analysis_notes: vars.consequence_analysis_notes

  - id: rank_consequences
    uses: evaluation.option.score
    input:
      options: vars.consequence_hypotheses
      goal: inputs.intended_goal
      risk_tolerance: inputs.risk_tolerance
      criteria:
        - name: likelihood
          description: How probable is this consequence given the action and context?
          weight: 0.35
        - name: severity
          description: How severe is the impact if this consequence materializes?
          weight: 0.4
        - name: reversibility
          description: Can this consequence be undone or mitigated after the fact?
          weight: 0.25
    output:
      scored_options: vars.ranked_consequences
      comparative_summary: vars.consequence_summary
      tradeoffs: vars.consequence_tradeoffs

  - id: generate_safer_options
    uses: reasoning.option.generate
    input:
      goal: >
        Generate 6 structurally distinct safer alternatives to the candidate action.
        The alternatives must achieve the same intended goal but with reduced risk
        exposure. Cover these structural angles: (1) original action with minimal
        guardrails added, (2) modified action to reduce blast radius, (3) staged/
        reversible version of the action, (4) alternative means to the same goal via
        a different path, (5) defer with explicit conditions that must be met first,
        (6) no-action option with explicit risk_of_inaction consequences.
      context: vars.consequence_summary
      constraints:
        risk_factors: vars.risk_factors
        known_constraints: inputs.known_constraints
        agent_permissions: inputs.agent_permissions
      max_options: 6
    output:
      options: vars.safer_options

  - id: analyze_safer_options
    uses: reasoning.option.analyze
    input:
      options: vars.safer_options
      context: vars.consequence_summary
      goal: inputs.intended_goal
    output:
      analyzed_options: vars.analyzed_alternatives
      analysis_notes: vars.alternatives_analysis_notes

  - id: score_safer_options
    uses: evaluation.option.score
    input:
      options: vars.safer_options
      goal: inputs.intended_goal
      risk_tolerance: inputs.risk_tolerance
      criteria:
        - name: goal_achievement
          description: Does this alternative still achieve the intended goal?
          weight: 0.4
        - name: risk_reduction
          description: How much does this alternative reduce the identified risks?
          weight: 0.35
        - name: feasibility
          description: Is this alternative actionable given current constraints?
          weight: 0.25
    output:
      scored_options: vars.scored_alternatives
      criteria_used: vars.alternatives_criteria
      comparative_summary: vars.alternatives_summary
      tradeoffs: vars.alternatives_tradeoffs

  - id: justify_strategy
    uses: decision.option.justify
    input:
      scored_options: vars.scored_alternatives
      analyzed_options: vars.analyzed_alternatives
      tradeoffs: vars.alternatives_tradeoffs
      goal: inputs.intended_goal
      constraints:
        risk_level: vars.risk_level
        risk_score: vars.risk_score
        risk_factors: vars.risk_factors
        uncertainty_level: vars.uncertainty_level
        extracted_uncertainties: vars.extracted_uncertainties
        scored_uncertainties: vars.scored_uncertainties
        known_constraints: inputs.known_constraints
      risk_tolerance: inputs.risk_tolerance
    output:
      recommendation: vars.strategy_recommendation
      alternatives_considered: vars.strategy_alternatives
      confidence_score: vars.strategy_confidence
      confidence_level: vars.strategy_confidence_level
      uncertainties: vars.strategy_uncertainties
      failure_modes: vars.strategy_failure_modes

  - id: map_continuation_decision
    uses: decision.flow.branch
    input:
      condition: >
        Select the appropriate continuation decision based on risk_level, risk_score,
        risk_safe, uncertainty_level, strategy_confidence, and explicit context
        hazards (sensitive data, scope ambiguity, destination controls, incident
        pressure, and rollback readiness). Evaluate branches in priority order -
        first matching branch wins.
      context:
        risk_level: vars.risk_level
        risk_score: vars.risk_score
        risk_safe: vars.risk_safe
        uncertainty_level: vars.uncertainty_level
        strategy_confidence: vars.strategy_confidence
        action_context: inputs.context
        risk_tolerance: inputs.risk_tolerance
      default_branch: proceed_with_limits
      branches:
        - id: abort
          label: Abort
          match_expression: risk_level == 'critical' and risk_safe == false and strategy_confidence < 0.3
        - id: escalate
          label: Escalate
          match_expression: risk_level == 'critical' or (risk_level == 'high' and action_context.contains_sensitive_data == true and action_context.destination_controls == 'unknown' and risk_tolerance == 'low')
        - id: require_confirmation
          label: Require confirmation
          match_expression: risk_level == 'high' and (risk_safe == false or risk_score >= 0.55 or uncertainty_level == 'high' or (action_context.contains_sensitive_data == true and (action_context.scope_defined == false or action_context.destination_controls == 'unknown')) or (action_context.active_incident == true and action_context.rollback_plan in ('none', 'limited', 'partial')) or action_context.safety_net == 'low')
        - id: ask_clarification
          label: Ask clarification
          match_expression: (risk_level in ('medium', 'high', 'critical') and uncertainty_level == 'high' and strategy_confidence < 0.75) or (action_context.contains_sensitive_data == true and (action_context.scope_defined == false or action_context.destination_controls == 'unknown'))
        - id: simulate_first
          label: Simulate first
          match_expression: (risk_level == 'high' and risk_safe == true) or (risk_level == 'medium' and (risk_score > 0.35 or uncertainty_level == 'medium'))
        - id: proceed_with_limits
          label: Proceed with limits
          match_expression: risk_level in ('high', 'medium') or (risk_level == 'low' and (risk_safe == false or uncertainty_level != 'low' or strategy_confidence < 0.5))
        - id: proceed
          label: Proceed
          match_expression: risk_level == 'low' and risk_safe == true and uncertainty_level == 'low' and strategy_confidence >= 0.5
    output:
      selected_branch: vars.decision_token
      rationale: vars.decision_rationale
      confidence: vars.decision_confidence

  - id: derive_operating_environment_signal
    uses: decision.flow.branch
    input:
      condition: >
        Derive an explicit operational context signal for downstream auditability.
      context:
        risk_level: vars.risk_level
        active_incident: inputs.context.active_incident
      default_branch: standard_context
      branches:
        - id: production_context
          label: Production context
          match_expression: risk_level in ('high', 'critical') or active_incident == true
        - id: standard_context
          label: Standard context
          match_expression: risk_level in ('low', 'medium') and active_incident != true
    output:
      selected_branch: vars.operating_environment_signal

  - id: derive_privacy_signal
    uses: decision.flow.branch
    input:
      condition: >
        Derive an explicit privacy-sensitivity signal for downstream auditability.
      context:
        action_context: inputs.context
      default_branch: standard_privacy_context
      branches:
        - id: sensitive_privacy_context
          label: Sensitive privacy context
          match_expression: action_context.contains_sensitive_data == true and (action_context.scope_defined == false or action_context.destination_controls == 'unknown')
        - id: standard_privacy_context
          label: Standard privacy context
          match_expression: action_context.contains_sensitive_data != true or (action_context.scope_defined == true and action_context.destination_controls != 'unknown')
    output:
      selected_branch: vars.privacy_signal

  - id: derive_rollback_signal
    uses: decision.flow.branch
    input:
      condition: >
        Derive an explicit rollback-readiness signal for downstream auditability.
      context:
        action_context: inputs.context
      default_branch: rollback_unknown
      branches:
        - id: rollback_ready
          label: Rollback ready
          match_expression: action_context.rollback_plan == 'full' or action_context.rollback_plan == 'partial'
        - id: rollback_limited
          label: Rollback limited
          match_expression: action_context.rollback_plan == 'limited'
        - id: rollback_unknown
          label: Rollback unknown
          match_expression: action_context.rollback_plan == 'unknown' or action_context.rollback_plan == 'none'
    output:
      selected_branch: vars.rollback_signal

  - id: derive_incident_pressure_signal
    uses: decision.flow.branch
    input:
      condition: >
        Derive an explicit incident-pressure signal for downstream auditability.
      context:
        action_context: inputs.context
      default_branch: no_incident_pressure
      branches:
        - id: incident_pressure_high
          label: Incident pressure high
          match_expression: action_context.active_incident == true and action_context.safety_net == 'low'
        - id: incident_pressure_present
          label: Incident pressure present
          match_expression: action_context.active_incident == true or action_context.safety_net == 'low'
        - id: no_incident_pressure
          label: No incident pressure
          match_expression: action_context.active_incident != true and action_context.safety_net != 'low'
    output:
      selected_branch: vars.incident_pressure_signal

  - id: assemble_output
    uses: data.record.merge
    input:
      records:
        - continuation_decision:
            decision: vars.decision_token
            rationale: vars.decision_rationale
            strategy_rationale: vars.strategy_recommendation
            confidence_score: vars.strategy_confidence
            confidence_level: vars.strategy_confidence_level
            risk_level: vars.risk_level
            risk_score: vars.risk_score
            risk_safe: vars.risk_safe
            uncertainty_level: vars.uncertainty_level
            safer_alternatives: vars.scored_alternatives
            affected_entities: vars.affected_entities
            risks: vars.risk_factors
            uncertainties: vars.extracted_uncertainties
            explicit_safety_checks:
              ambiguity_signal: vars.uncertainty_level
              risk_of_inaction_signal: vars.risk_level
              uncertainty_level: vars.uncertainty_level
              uncertainty_confidence: vars.uncertainty_confidence
              operating_environment_signal: vars.operating_environment_signal
              production_signal: vars.operating_environment_signal
              privacy_signal: vars.privacy_signal
              rollback_signal: vars.rollback_signal
              incident_pressure_signal: vars.incident_pressure_signal
              contextual_signals: inputs.context
            action_assumptions: []
            branch_rationale: vars.decision_rationale
        - human_readable: vars.strategy_recommendation
        - safer_alternatives: vars.scored_alternatives
        - consequence_forecast: vars.ranked_consequences
      strategy: deep_merge
    output:
      record.continuation_decision: outputs.continuation_decision
      record.human_readable: outputs.human_readable
      record.safer_alternatives: outputs.safer_alternatives
      record.consequence_forecast: outputs.consequence_forecast
