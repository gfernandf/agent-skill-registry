id: agent.plan-from-objective
version: 0.1.0
name: Plan From Objective
description: Generate a plan from an objective.
inputs:
  objective:
    type: string
    required: true
outputs:
  plan:
    type: object
    required: true
steps:
- id: generate_plan
  uses: agent.plan.generate
  input:
    objective: inputs.objective
  output:
    plan: outputs.plan
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
