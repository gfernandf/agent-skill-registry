id: agent.plan-and-route
version: 0.1.0
name: Plan and Route
description: Generate a plan from an objective and route it.
inputs:
  objective:
    type: string
    required: true
outputs:
  plan:
    type: object
    required: true
  route:
    type: string
    required: true
steps:
- id: generate_plan
  uses: agent.plan.generate
  input:
    objective: inputs.objective
  output:
    plan: outputs.plan
- id: route_plan
  uses: agent.input.route
  input:
    input: outputs.plan
  output:
    route: outputs.route
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - agent
  - orchestration
  - planning
  - routing
  - delegation
  use_cases:
  - Route an incoming user request to the appropriate capability
  - Generate a multi-step plan from a complex goal
  - Decompose an ambiguous request into actionable sub-tasks
  examples:
  - description: Route a user question to the right capability
    input:
      goal: Summarize this PDF for me
      context:
        file: report.pdf
    output:
      plan:
      - step: 1
        capability: pdf.document.read
      - step: 2
        capability: text.content.summarize
