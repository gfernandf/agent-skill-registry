id: agent.orchestrate-from-prompt
version: 0.1.1
name: Orchestrate From Prompt
description: >
  ORCA planner skill that translates a raw user prompt into an execution-ready
  compiled plan. It does not execute the plan and does not generate a final
  user report. It prioritizes reuse by discovering and ranking existing skills
  and capabilities, validates and reconciles the plan structure, compiles the
  DAG, and returns planner evidence so downstream executors can audit why a
  plan was selected.

inputs:
  prompt:
    type: string
    required: true
    description: Raw user prompt to translate into an ORCA workflow.
  context:
    type: object
    required: false
    description: Optional session/request context.
  registry:
    type: object
    required: false
    description: Optional registry snapshot or subset for plan validation/search.
  catalog_filters:
    type: object
    required: false
    description: Optional filters for candidate discovery.
  planning_strategy:
    type: string
    required: false
    description: Planning strategy hint for macro planning.
  state_schema:
    type: object
    required: false
    description: Optional state schema used for binding and validation.
  runtime_config:
    type: object
    required: false
    description: Runtime compilation settings for plan synthesis.
  user_permissions:
    type: object
    required: false
    description: Permission map used by plan gate.
  policy_context:
    type: object
    required: false
    description: Policy context used by plan gate.
  initial_state:
    type: object
    required: false
    description: Initial state for plan execution.

outputs:
  compiled_plan:
    type: object
    required: true
    description: Compiled ORCA DAG ready to be consumed by agent.plan.execute.
  compiled_plan_json:
    type: string
    required: false
    description: JSON-serialized compiled plan for downstream executors that ingest text payloads.
  authorization_result:
    type: object
    required: true
    description: Policy gate decision for the compiled plan.
  candidate_items:
    type: array
    required: true
    description: Catalog candidates considered during planning.
  ranked_skills:
    type: array
    required: true
    description: Ranked reusable skills considered by planner.
  ranked_capabilities:
    type: array
    required: true
    description: Ranked capabilities considered by planner.
  missing_capabilities:
    type: array
    required: true
    description: Gaps detected by planner for missing capabilities (empty for fast path).
  missing_skills:
    type: array
    required: true
    description: Gaps detected by planner for missing skills (empty for fast path).
  gap_severity:
    type: string
    required: true
    description: Planner-estimated severity for catalog gaps (none for fast path).
  routing_decision:
    type: string
    required: true
    description: >
      Which execution path was selected by the complexity classifier:
      'fast_path' for single-operation requests, 'full_path' for
      multi-step workflows with dependencies.
  routing_rationale:
    type: string
    required: true
    description: Explanation of why fast_path or full_path was selected.

steps:
  # ── COMMON: normalize + interpret ─────────────────────────────────────────
  - id: normalize_request
    uses: agent.request.normalize
    input:
      user_message: inputs.prompt
      context: inputs.context
    output:
      normalized_request: vars.normalized_request
      language: vars.language

  - id: interpret_goal
    uses: agent.goal.interpret
    input:
      normalized_request: vars.normalized_request
      context: inputs.context
    output:
      interpreted_goal: vars.interpreted_goal
      requires_clarification: vars.requires_clarification

  # ── COMMON: complexity classifier ─────────────────────────────────────────
  # Decides fast_path (single-operation, no dependencies) vs
  # full_path (multi-step, sequencing, intermediate outputs).
  - id: classify_complexity
    uses: agent.flow.branch
    input:
      condition: >
        The user goal requires sequencing multiple operations, depends on
        intermediate outputs from one step to another, or involves conditional
        branching within the workflow.
      context:
        interpreted_goal: vars.interpreted_goal
        requires_clarification: vars.requires_clarification
      branches:
        - id: full_path
          label: full_path
          match: "multi step dependencies sequencing branching"
        - id: fast_path
          label: fast_path
          match: "single simple direct one-step"
      default_branch: full_path
    output:
      selected_branch: outputs.routing_decision
      rationale: outputs.routing_rationale

  # ── COMMON: catalog search (both paths need ranked candidates) ─────────────
  - id: search_catalog
    uses: agent.catalog.search
    input:
      goal: vars.interpreted_goal
      registry: inputs.registry
      filters: inputs.catalog_filters
    output:
      candidate_items: outputs.candidate_items
      total_matched: vars.total_matched

  - id: rank_catalog
    uses: agent.catalog.rank
    input:
      candidate_items: outputs.candidate_items
      interpreted_goal: vars.interpreted_goal
    output:
      ranked_skills: outputs.ranked_skills
      ranked_capabilities: outputs.ranked_capabilities

  # ── CORE PLANNER PIPELINE ─────────────────────────────────────────────────
  - id: define_criteria
    uses: agent.criteria.define
    input:
      interpreted_goal: vars.interpreted_goal
    output:
      success_criteria: vars.success_criteria
      quality_criteria: vars.quality_criteria
      acceptance_criteria: vars.acceptance_criteria

  - id: detect_catalog_gaps
    uses: agent.catalog.detect
    input:
      interpreted_goal: vars.interpreted_goal
      candidate_items: outputs.candidate_items
    output:
      missing_capabilities: outputs.missing_capabilities
      missing_skills: outputs.missing_skills
      gap_severity: outputs.gap_severity

  - id: create_macro_plan
    uses: agent.task.plan
    input:
      interpreted_goal: vars.interpreted_goal
      candidate_skills: outputs.ranked_skills
      candidate_capabilities: outputs.ranked_capabilities
      planning_strategy: inputs.planning_strategy
    output:
      macro_plan: vars.macro_plan
      stage_count: vars.stage_count

  - id: split_plan
    uses: agent.plan.split
    input:
      macro_stage: vars.macro_plan
      candidate_skills: outputs.ranked_skills
      candidate_capabilities: outputs.ranked_capabilities
      current_state: inputs.initial_state
    output:
      expanded_steps: vars.expanded_steps
      step_count: vars.step_count

  - id: map_plan_inputs
    uses: agent.plan.map
    input:
      expanded_steps: vars.expanded_steps
      state_schema: inputs.state_schema
    output:
      bound_steps: vars.bound_steps
      unresolved_bindings: vars.unresolved_bindings

  - id: validate_plan
    uses: agent.plan.validate
    input:
      expanded_plan:
        bound_steps: vars.bound_steps
      registry: inputs.registry
      state_schema: inputs.state_schema
    output:
      validation_result: vars.validation_result

  - id: reconcile_plan
    uses: agent.plan.reconcile
    input:
      invalid_plan:
        bound_steps: vars.bound_steps
      validation_errors: vars.validation_result.errors
      registry: inputs.registry
    output:
      repaired_plan: vars.repaired_plan
      repair_notes: vars.repair_notes
      still_invalid: vars.still_invalid

  - id: synthesize_plan
    uses: agent.plan.synthesize
    input:
      validated_plan: vars.repaired_plan
      runtime_config: inputs.runtime_config
    output:
      compiled_plan: outputs.compiled_plan
      compiled_plan_json: outputs.compiled_plan_json
      step_count: vars.compiled_step_count

  # ── COMMON: policy gate (always runs, reads outputs.compiled_plan) ─────────
  - id: gate_plan
    uses: agent.plan.gate
    input:
      compiled_plan: outputs.compiled_plan
      user_permissions: inputs.user_permissions
      policy_context: inputs.policy_context
    output:
      authorization_result: outputs.authorization_result

metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
    - agent
    - orchestration
    - prompt-to-workflow
    - planning
    - execution
    - mcp
  use_cases:
    - Translate a free-form user prompt into an execution-ready ORCA compiled plan.
    - Reuse existing skills/capabilities through catalog search and ranking.
    - Produce planner evidence for downstream audit before execution.
  examples:
    - description: Convert a product request into a compiled plan only
      input:
        prompt: "Analiza esta solicitud y ejecuta un plan para producir una respuesta accionable"
      output:
        compiled_plan:
          execution_order: ["s1_step1", "s1_step2"]
