id: code.diff-summary
version: 0.1.0
name: Diff Summary
description: Extract a code diff and summarize it.
inputs:
  code_a:
    type: string
    required: true
  code_b:
    type: string
    required: true
outputs:
  diff:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: extract_diff
  uses: code.diff.extract
  input:
    code_a: inputs.code_a
    code_b: inputs.code_b
  output:
    diff: outputs.diff
- id: summarize_diff
  uses: text.content.summarize
  input:
    text: outputs.diff
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - code
  - development
  - engineering
  - summarization
  use_cases:
  - Summarize code changes in a diff for review
  - Extract key modifications from a pull request diff
  - Generate human-readable summaries of code patches
  examples:
  - description: Summarize a code diff
    input:
      diff: '--- a/main.py

        +++ b/main.py

        @@ -10,3 +10,5 @@

        +import logging

        +logger = logging.getLogger(__name__)'
    output:
      summary: Added logging import and logger initialization to main.py
      files_changed:
      - main.py
      change_type: enhancement
