id: text.entity-summary
version: 0.1.0
name: Entity Summary
description: Extract named entities and summarize text.
inputs:
  text:
    type: string
    required: true
outputs:
  entities:
    type: array
    required: true
  summary:
    type: string
    required: true
steps:
- id: extract_entities
  uses: text.entity.extract
  input:
    text: inputs.text
  output:
    entities: outputs.entities
- id: summarize
  uses: text.content.summarize
  input:
    text: inputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - text
  - nlp
  - language
  - summarization
  use_cases:
  - Extract named entities and produce a summary
  - Identify key people, places, and organizations in text
  - Generate entity-centric summaries from documents
  examples:
  - description: Extract entities and summarize
    input:
      text: Apple CEO Tim Cook announced a new partnership with Samsung in Seoul.
    output:
      entities:
      - text: Tim Cook
        type: PERSON
      - text: Apple
        type: ORG
      - text: Samsung
        type: ORG
      - text: Seoul
        type: LOC
      summary: Apple CEO Tim Cook announced a Samsung partnership in Seoul.
