id: text.entity-summary
version: 0.1.0
name: Entity Summary
description: Extract named entities and summarize text.
inputs:
  text:
    type: string
    required: true
outputs:
  entities:
    type: array
    required: true
  summary:
    type: string
    required: true
steps:
- id: extract_entities
  uses: text.entity.extract
  input:
    text: inputs.text
  output:
    entities: outputs.entities
- id: summarize
  uses: text.content.summarize
  input:
    text: inputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
