id: text.language-summary
version: 0.1.0
name: Language Summary
description: Detect the language of a text and summarize it.
inputs:
  text:
    type: string
    required: true
outputs:
  language:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: detect_language
  uses: text.language.detect
  input:
    text: inputs.text
  output:
    language: outputs.language
- id: summarize
  uses: text.content.summarize
  input:
    text: inputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - text
  - nlp
  - language
  - summarization
  use_cases:
  - Detect the language of text and produce a summary
  - Summarize content in its detected source language
  - Process multilingual text with language-aware summarization
  examples:
  - description: Detect language and summarize
    input:
      text: Le marché européen montre des signes de reprise après la crise.
    output:
      language: fr
      summary: Le marché européen se reprend après la crise.
      confidence: 0.95
