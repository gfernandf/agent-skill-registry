id: text.simple-summarize
version: 0.1.0
name: Simple Summarize
description: Simple summarization pipeline.

inputs:
  text:
    type: string
    required: true

outputs:
  summary:
    type: string
    required: true

steps:

  - id: summarize
    uses: text.summarize
    input:
      text: inputs.text
    output:
      summary: outputs.summary
metadata:
  classification:
    role: utility
    invocation: both
    attach_targets:
      - output
      - transcript
    effect_mode: enrich
