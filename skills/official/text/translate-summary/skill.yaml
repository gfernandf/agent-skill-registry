id: text.translate-summary
version: 0.1.0
name: Translate Summary
description: Translate text and then summarize the translation.
inputs:
  text:
    type: string
    required: true
  target_language:
    type: string
    required: true
outputs:
  translation:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: translate
  uses: text.content.translate
  input:
    text: inputs.text
    target_language: inputs.target_language
  output:
    translation: outputs.translation
- id: summarize
  uses: text.content.summarize
  input:
    text: outputs.translation
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - text
  - nlp
  - language
  - summarization
  - translation
  use_cases:
  - Translate text and produce a summary of the translation
  - Cross-lingual summarization for multilingual content
  - Translate documents and distill key points
  examples:
  - description: Translate and summarize text
    input:
      text: Die Energiewende erfordert massive Investitionen in erneuerbare Energien.
      target_language: en
    output:
      translation: The energy transition requires massive investments in renewable energy.
      summary: Germany's energy transition demands significant renewable energy investment.
      source_language: de
