id: text.detect-language-and-classify
version: 0.1.0
name: Detect Language and Classify
description: Detect the language of a text and classify it.
inputs:
  text:
    type: string
    required: true
  labels:
    type: array
    required: false
outputs:
  language:
    type: string
    required: true
  label:
    type: string
    required: true
  confidence:
    type: number
    required: false
steps:
- id: detect_language
  uses: text.language.detect
  input:
    text: inputs.text
  output:
    language: outputs.language
- id: classify
  uses: text.content.classify
  input:
    text: inputs.text
    labels: inputs.labels
  output:
    label: outputs.label
    confidence: outputs.confidence
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: read_only
