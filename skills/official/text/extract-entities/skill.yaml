id: text.extract-entities
version: 0.1.0
name: Extract Entities
description: Extract named entities from text.
inputs:
  text:
    type: string
    required: true
outputs:
  entities:
    type: array
    required: true
steps:
- id: extract_entities
  uses: text.entity.extract
  input:
    text: inputs.text
  output:
    entities: outputs.entities
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: read_only
