id: memory.retrieve-summary
version: 0.1.0
name: Retrieve Summary
description: Retrieve a memory value and summarize it.
inputs:
  key:
    type: string
    required: true
outputs:
  value:
    type: object
    required: false
  found:
    type: boolean
    required: true
  summary:
    type: string
    required: true
steps:
- id: retrieve_memory
  uses: memory.entry.retrieve
  input:
    key: inputs.key
  output:
    value: outputs.value
    found: outputs.found
- id: merge_value
  uses: text.content.merge
  input:
    items:
      - outputs.value
  output:
    text: vars.value_text
- id: summarize_value
  uses: text.content.summarize
  input:
    text: vars.value_text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: read_only
  tags:
  - memory
  - storage
  - retrieval
  - summarization
  use_cases:
  - Retrieve stored memories and generate a summary
  - Find relevant past context for a given query
  - Synthesize stored knowledge entries into a brief
  examples:
  - description: Retrieve and summarize stored memories
    input:
      query: What do we know about client X preferences?
      max_results: 5
    output:
      summary: Client X prefers email communication, has budget constraints, and prioritizes delivery speed.
      sources: 3
