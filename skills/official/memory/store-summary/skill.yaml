id: memory.store-summary
version: 0.1.0
name: Store Summary
description: Summarize text and store the summary in memory.
inputs:
  text:
    type: string
    required: true
  key:
    type: string
    required: true
outputs:
  summary:
    type: string
    required: true
  stored:
    type: boolean
    required: true
steps:
- id: summarize
  uses: text.content.summarize
  input:
    text: inputs.text
  output:
    summary: outputs.summary
- id: store_memory
  uses: memory.entry.store
  input:
    key: inputs.key
    value: outputs.summary
  output:
    stored: outputs.stored
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: enrich
  tags:
  - memory
  - storage
  - retrieval
  - summarization
  use_cases:
  - Store a summary of content in memory
  - Persist key findings for later retrieval
  - Save distilled context from agent interactions
  examples:
  - description: Store a summary in memory
    input:
      content: Meeting concluded with agreement to proceed with option B
      key: meeting-2026-03-20
      namespace: meetings
    output:
      stored: true
      key: meeting-2026-03-20
