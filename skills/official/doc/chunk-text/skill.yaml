id: doc.chunk-text
version: 0.1.0
name: Chunk Text
description: Split text into chunks.
inputs:
  text:
    type: string
    required: true
  chunk_size:
    type: number
    required: false
  overlap:
    type: number
    required: false
outputs:
  chunks:
    type: array
    required: true
steps:
- id: chunk
  uses: doc.chunk
  input:
    text: inputs.text
    chunk_size: inputs.chunk_size
    overlap: inputs.overlap
  output:
    chunks: outputs.chunks
metadata:
  classification:
    role: utility
    invocation: direct
    effect_mode: read_only
