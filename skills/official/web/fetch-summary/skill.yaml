id: web.fetch-summary
version: 0.1.0
name: Fetch and Summarize Web Page
description: Fetches a web page and returns a summarized version of its main text.

inputs:
  url:
    type: string
    required: true

outputs:
  summary:
    type: string
    required: true

steps:

  - id: fetch_page
    uses: web.fetch
    input:
      url: inputs.url
    output:
      content: vars.page_content

  - id: extract_text
    uses: text.extract
    input:
      text: vars.page_content
    output:
      text: vars.cleaned_text

  - id: summarize_text
    uses: text.summarize
    input:
      text: vars.cleaned_text
    output:
      summary: outputs.summary
