id: web.page-summary
version: 0.1.0
name: Page Summary
description: Extract main text from page content and summarize it.
inputs:
  content:
    type: string
    required: true
outputs:
  text:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: extract_page
  uses: web.page.extract
  input:
    content: inputs.content
  output:
    text: outputs.text
- id: summarize
  uses: text.content.summarize
  input:
    text: outputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: utility
    invocation: attach
    attach_targets:
    - output
    effect_mode: enrich
  tags:
  - web
  - fetch
  - scraping
  - summarization
  use_cases:
  - Fetch a web page and produce a comprehensive summary
  - Extract and summarize content from a URL
  - Generate structured summaries of web content
  examples:
  - description: Generate a comprehensive web page summary
    input:
      url: https://example.com/whitepaper/cloud-native
    output:
      summary: Whitepaper advocates cloud-native architecture with microservices, containerization, and GitOps practices for
        enterprise adoption.
      sections: 5
