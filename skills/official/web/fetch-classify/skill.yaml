id: web.fetch-classify
version: 0.1.0
name: Fetch and Classify
description: Fetch a web page, extract its main text, and classify the content.
inputs:
  url:
    type: string
    required: true
  labels:
    type: array
    required: false
outputs:
  content:
    type: string
    required: true
  text:
    type: string
    required: true
  label:
    type: string
    required: true
  confidence:
    type: number
    required: false
steps:
- id: fetch
  uses: web.page.fetch
  input:
    url: inputs.url
  output:
    content: outputs.content
- id: extract_page
  uses: web.page.extract
  input:
    content: outputs.content
  output:
    text: outputs.text
- id: classify
  uses: text.content.classify
  input:
    text: outputs.text
    labels: inputs.labels
  output:
    label: outputs.label
    confidence: outputs.confidence
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - web
  - fetch
  - scraping
  - classification
  - fetching
  - http
  use_cases:
  - Fetch a web page and classify its content
  - Categorize URLs by topic after fetching
  - Tag web resources with content classifications
  examples:
  - description: Fetch a URL and classify content
    input:
      url: https://example.com/blog/ai-trends-2026
    output:
      title: AI Trends 2026
      categories:
      - technology
      - artificial-intelligence
      - trends
      content_type: blog_post
