id: web.search-summary
version: 0.1.0
name: Search Summary
description: Search the web and summarize the search results.
inputs:
  query:
    type: string
    required: true
    description: Search query text.
  limit:
    type: number
    required: false
    description: Maximum number of results to summarize. Defaults to 5 and is clamped to 1..20.
outputs:
  results:
    type: array
    required: true
    description: Ordered list of result items. Empty when no live results are available.
  summary:
    type: string
    required: true
    description: Summary text generated from merged results. Empty when results is empty.
steps:
- id: search
  uses: web.source.search
  input:
    query: inputs.query
    limit: inputs.limit
  output:
    results: outputs.results
- id: merge_results
  uses: reasoning.content.merge
  input:
    items: outputs.results
  output:
    text: vars.merged_results
- id: summarize_results
  uses: reasoning.content.summarize
  input:
    text: vars.merged_results
  output:
    summary: outputs.summary
metadata:
  status: stable
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - web
  - fetch
  - scraping
  - summarization
  - search
  - discovery
  use_cases:
  - Perform a web search and summarize the results
  - Find and synthesize information from search results
  - Generate research summaries from web search queries
  examples:
  - description: Search the web and summarize results
    input:
      query: latest advances in quantum computing 2026
      limit: 5
    output:
      results:
      - url: https://example.com/quantum-2026
        title: Quantum 2026 Update
        snippet: Recent advances include error-corrected qubits and hybrid algorithms.
        content: Quantum 2026 Update. Recent advances include error-corrected qubits and hybrid algorithms.
      summary: Recent advances include error-corrected qubits, hybrid quantum-classical algorithms, and first commercial quantum
        advantage demonstrations.
