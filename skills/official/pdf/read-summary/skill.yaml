id: pdf.read-summary
version: 0.1.0
name: Read PDF Summary
description: Read a PDF and summarize its text.
inputs:
  path:
    type: string
    required: true
outputs:
  text:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: read_pdf
  uses: pdf.document.read
  input:
    path: inputs.path
  output:
    text: outputs.text
- id: summarize
  uses: text.content.summarize
  input:
    text: outputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - pdf
  - document
  - extraction
  - summarization
  use_cases:
  - Read a PDF and generate a comprehensive summary
  - Extract key points from PDF documents
  - Summarize multi-page PDFs for quick consumption
  examples:
  - description: Summarize a PDF document
    input:
      pdf_path: /docs/whitepaper.pdf
      max_pages: 20
    output:
      summary: Whitepaper proposes a new framework for distributed agent coordination with emphasis on fault tolerance and
        state management.
      pages_processed: 15
