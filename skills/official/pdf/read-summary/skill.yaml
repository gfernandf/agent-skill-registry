id: pdf.read-summary
version: 0.1.0
name: Read PDF Summary
description: Read a PDF and summarize its text.
inputs:
  path:
    type: string
    required: true
outputs:
  text:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: read_pdf
  uses: pdf.read
  input:
    path: inputs.path
  output:
    text: outputs.text
- id: summarize
  uses: text.summarize
  input:
    text: outputs.text
  output:
    summary: outputs.summary
