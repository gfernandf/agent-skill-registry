id: pdf.read-keyword-summary
version: 0.1.0
name: Read PDF Keyword Summary
description: Read a PDF, extract keywords, and summarize its text.
inputs:
  path:
    type: string
    required: true
outputs:
  text:
    type: string
    required: true
  keywords:
    type: array
    required: true
  summary:
    type: string
    required: true
steps:
- id: read_pdf
  uses: pdf.document.read
  input:
    path: inputs.path
  output:
    text: outputs.text
- id: extract_keywords
  uses: text.keyword.extract
  input:
    text: outputs.text
  output:
    keywords: outputs.keywords
- id: summarize
  uses: text.content.summarize
  input:
    text: outputs.text
  output:
    summary: outputs.summary
metadata:
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - pdf
  - document
  - extraction
  - summarization
  use_cases:
  - Read a PDF and produce a keyword-focused summary
  - Extract key terms and their context from PDF documents
  - Generate keyword-weighted summaries of PDF content
  examples:
  - description: Keyword-focused PDF summary
    input:
      pdf_path: /docs/contract.pdf
      keywords:
      - penalty
      - termination
      - liability
    output:
      summary: Contract includes a 5% penalty clause for late delivery, 30-day termination notice, and capped liability at
        contract value.
      keyword_hits:
        penalty: 3
        termination: 2
        liability: 4
