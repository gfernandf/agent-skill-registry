id: memory.store-embedding
version: 0.1.0
name: Store Embedding
description: Generate an embedding from text and store it in memory.
inputs:
  text:
    type: string
    required: true
  key:
    type: string
    required: true
outputs:
  embedding:
    type: array
    required: true
  stored:
    type: boolean
    required: true
steps:
- id: embed_text
  uses: text.content.embed
  input:
    text: inputs.text
  output:
    embedding: outputs.embedding
- id: store_embedding
  uses: memory.entry.store
  input:
    key: inputs.key
    value: outputs.embedding
  output:
    stored: outputs.stored
metadata:
  status: experimental
  classification:
    role: utility
    invocation: direct
    effect_mode: enrich
