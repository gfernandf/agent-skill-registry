id: analysis.decompose
version: 0.1.0
name: Decompose Problem
description: >
  Divide a complex problem or topic into manageable analysis blocks to avoid
  monolithic reasoning and mixed dimensions. Selects a decomposition strategy,
  generates described components with dependencies, and validates the
  decomposition for gaps and overlaps.

  Pipeline: (1) classify the best decomposition strategy, (2) split into
  components with dependencies and order, (3) quality gate on the decomposition.

  Typical upstream: task.frame output or direct user input.
  Typical downstream: analysis.synthesize (per component), analysis.compare,
  decision.make, or any skill that benefits from scoped sub-problems.

inputs:
  problem:
    type: string
    required: true
    description: >
      The problem or topic to decompose. Should be a clear statement.

  context:
    type: string
    required: false
    description: >
      Background information, prior analysis, or domain knowledge.

  decomposition_mode:
    type: string
    required: false
    description: >
      Preferred decomposition axis: themes | dimensions | phases | questions |
      stakeholders | risks. If omitted, step 1 selects the best strategy.

outputs:
  decomposition_strategy:
    type: string
    required: true
    description: >
      The strategy used for decomposition.

  components:
    type: array
    required: true
    description: >
      List of components with id, label, description, dependencies, and
      analysis_order.

  gaps:
    type: array
    required: true
    description: >
      Areas that may be missing from the decomposition.

  overlaps:
    type: array
    required: true
    description: >
      Potential overlaps between components.

  decomposition_quality:
    type: object
    required: true
    description: >
      Quality assessment: overall_score (0-1) and per-dimension scores.

steps:

  # ── Step 1: Select decomposition strategy ─────────────────────────────────
  # Classify which axis best fits the problem. If decomposition_mode is
  # provided, this step validates it against the problem.
  - id: select_strategy
    uses: text.classify
    input:
      text: inputs.problem
      labels:
        - themes
        - dimensions
        - phases
        - questions
        - stakeholders
        - risks
      context: inputs.context
      hint: inputs.decomposition_mode
    output:
      label: outputs.decomposition_strategy

  # ── Step 2: Split into components ─────────────────────────────────────────
  # Generate described components with dependencies, order, gaps, overlaps.
  - id: split_problem
    uses: analysis.split
    input:
      problem: inputs.problem
      strategy: outputs.decomposition_strategy
      context: inputs.context
    output:
      components: outputs.components
      gaps: outputs.gaps
      overlaps: outputs.overlaps

  # ── Step 3: Quality gate ──────────────────────────────────────────────────
  # Is the decomposition MECE? Are components well-scoped? Dependencies clear?
  - id: assess_quality
    uses: eval.output.score
    input:
      output:
        components: outputs.components
        gaps: outputs.gaps
        overlaps: outputs.overlaps
        strategy: outputs.decomposition_strategy
      rubric:
        dimensions:
          mece_compliance:
            description: >
              Are components mutually exclusive and collectively exhaustive?
              Score low if significant gaps or overlaps exist.
            weight: 0.35
          component_clarity:
            description: >
              Is each component well-described with clear scope boundaries?
            weight: 0.25
          dependency_coherence:
            description: >
              Are dependencies between components logical and complete?
              No circular dependencies, no missing links.
            weight: 0.20
          granularity:
            description: >
              Are components at the right granularity — not too coarse
              (monolithic) nor too fine (fragmented)?
            weight: 0.20
    output:
      score: outputs.decomposition_quality

metadata:
  status: experimental
  tags:
    - analysis
    - decomposition
    - structuring
    - problem-solving
  category: analysis
  use_cases:
    - Break down a complex market analysis into dimensions
    - Decompose a technology migration into phases
    - Split a regulatory compliance review into themes
    - Structure a research agenda into key questions
