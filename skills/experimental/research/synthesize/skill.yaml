id: research.synthesize
version: 0.2.0
name: Research Synthesize
description: >
  Transform a heterogeneous collection of research materials into a structured,
  actionable synthesis artifact. Accepts items as pre-extracted text or as source
  references (url, pdf_path, fs_path, memory_key). Resolves sources, then
  produces the full synthesis in a single model call — summary, key points,
  insights, tensions, uncertainties, coverage, next steps, quality assessment,
  and a human-readable narrative.

  Fast path (default): 2 steps, 1 LLM call. Comparable in latency to a direct
  chat interaction but with a stable output contract and full traceability.

  Suitable as an intermediate block in longer agent workflows: feeds naturally
  into decision.compare_options, task.frame, or direct human review.

inputs:
  items:
    type: array
    required: true
    description: >
      List of research items to synthesize. Each item must include `id` and either
      `content` (pre-extracted text) or `source_ref` (object with `type` and
      `location`). Optional per-item fields: title, type (article | report | note |
      web_page | search_result | agent_output | transcript | raw_text), source,
      relevance_hint, metadata.

  topic:
    type: string
    required: false
    description: >
      Topic or subject of the research. Anchors the synthesis. If omitted, the
      skill infers the dominant topic from the corpus.

  goal:
    type: string
    required: false
    description: >
      Intended use of the synthesis (e.g. "evaluate expansion into market X",
      "assess regulatory risk for hydrogen in Europe"). Influences relevance
      prioritization and next_steps suggestions.

  focus:
    type: string
    required: false
    description: >
      Optional extraction and synthesis focus hint. Examples: "prioritize risks",
      "prioritize contradictions", "executive summary", "emphasize opportunities".

  max_detail:
    type: string
    required: false
    description: "Output depth: brief | standard | detailed. Defaults to standard."

  quality_profile:
    type: string
    required: false
    description: >
      Quality gate stringency: standard | strict. Defaults to standard.
      standard: self-assessed quality in the synthesis call.
      strict: reserved for future grounding validation step.

outputs:
  summary:
    type: string
    required: true
    description: >
      Executive summary of the corpus. Answers: what the material is about,
      what the key conclusions are, and what seems most important.

  key_points:
    type: array
    required: true
    description: >
      Consolidated list of stable findings or claims that appear central or
      recurrent across sources. Each entry is a concise statement.

  insights:
    type: array
    required: true
    description: >
      Interpretive or non-trivial observations not captured by key_points.
      Patterns, implications, and differential signals worth noting.

  tensions:
    type: array
    required: true
    description: >
      Points where two or more items conflict, diverge in emphasis, or carry
      incompatible signals on the same topic. Each entry names the tension and
      the diverging positions.

  uncertainties:
    type: array
    required: true
    description: >
      Areas that are unclear, weakly supported, or missing from the corpus.
      Each entry is a statement of what is not known or not well established.

  source_coverage:
    type: object
    required: true
    description: >
      Coverage metadata: total_items, processed_items, coverage_ratio,
      dominant_subset_warning (true if a small subset dominates the synthesis),
      item_type_distribution.

  next_steps:
    type: array
    required: true
    description: >
      Suggested continuation actions. Examples: investigate an unresolved area,
      contrast a tension, compare options, pass to decision.compare_options.

  synthesis_quality:
    type: object
    required: true
    description: >
      Self-assessed quality block: confidence_score (0-1), coverage_ratio,
      evidence_strength, tension_density, uncertainty_load, quality_notes,
      assessment_passed.

  human_readable:
    type: string
    required: true
    description: >
      Narrative prose version of the synthesis suitable for direct human
      consumption without further post-processing.

steps:

  - id: resolve_sources
    uses: research.source.retrieve
    input:
      items: inputs.items
    output:
      items: vars.resolved_items

  - id: synthesize
    uses: model.output.generate
    input:
      instruction: >
        You are a research synthesis engine. You receive a collection of source
        items (already resolved to text) plus optional anchors in the constraints
        object: topic, goal, focus. Produce the complete synthesis in one pass.

        Heuristics:
        - Elevate a claim to key_point if it appears across multiple items or is
          clearly central to the topic.
        - Elevate a singular but important differential signal to insight.
        - Mark a tension when two items push in opposite directions on the same
          theme. Include topic, position_a, position_b.
        - Mark an uncertainty when a claim is weakly supported or a relevant area
          is absent from the corpus.
        - Suggest next_steps aligned to goal if provided, otherwise suggest
          generally useful follow-ups.
        - source_coverage: count total_items and processed_items from the input,
          compute coverage_ratio, flag dominant_subset_warning if a small subset
          dominates, list item_type_distribution.
        - human_readable: a narrative prose version (3-8 paragraphs depending on
          detail level) suitable for direct human consumption.
        - synthesis_quality: self-assess with confidence_score =
          0.35 * coverage_ratio + 0.35 * evidence_strength
          - 0.15 * tension_density - 0.15 * uncertainty_load, clamped [0, 1].
          Set assessment_passed = true if confidence_score >= 0.4 and
          coverage_ratio >= 0.5.

        Rules:
        - Do not fabricate claims not traceable to the source items.
        - Do not repeat the full source text in the output.
        - Respect the detail level for depth of each field.
        - If topic is not provided, infer the dominant topic from the corpus.
      context_items: vars.resolved_items
      output_schema:
        type: object
        properties:
          summary:
            type: string
          key_points:
            type: array
            items:
              type: string
          insights:
            type: array
            items:
              type: string
          tensions:
            type: array
          uncertainties:
            type: array
            items:
              type: string
          source_coverage:
            type: object
            properties:
              total_items:
                type: number
              processed_items:
                type: number
              coverage_ratio:
                type: number
              dominant_subset_warning:
                type: boolean
              item_type_distribution:
                type: object
            required:
              - total_items
              - processed_items
              - coverage_ratio
              - dominant_subset_warning
              - item_type_distribution
          next_steps:
            type: array
            items:
              type: string
          synthesis_quality:
            type: object
            properties:
              confidence_score:
                type: number
              coverage_ratio:
                type: number
              evidence_strength:
                type: number
              tension_density:
                type: number
              uncertainty_load:
                type: number
              quality_notes:
                type: string
              assessment_passed:
                type: boolean
            required:
              - confidence_score
              - evidence_strength
              - quality_notes
              - assessment_passed
          human_readable:
            type: string
        required:
          - summary
          - key_points
          - insights
          - tensions
          - uncertainties
          - source_coverage
          - next_steps
          - synthesis_quality
          - human_readable
      detail_level: inputs.max_detail
      constraints:
        no_fabrication: true
        evidence_required: true
        topic: inputs.topic
        goal: inputs.goal
        focus: inputs.focus
    output:
      output.summary: outputs.summary
      output.key_points: outputs.key_points
      output.insights: outputs.insights
      output.tensions: outputs.tensions
      output.uncertainties: outputs.uncertainties
      output.source_coverage: outputs.source_coverage
      output.next_steps: outputs.next_steps
      output.synthesis_quality: outputs.synthesis_quality
      output.human_readable: outputs.human_readable

metadata:
  status: experimental
  tags:
    - research
    - synthesis
    - analysis
    - multi-source
    - decision-support
  category: research
  use_cases:
    - Consolidate multiple research documents into a structured synthesis
    - Integrate agent findings before passing to a decision workflow
    - Compress research context without losing key signals
    - Prepare a human-readable briefing from heterogeneous source material
    - Feed structured synthesis output into decision.compare_options
  examples:
    - description: Synthesize market expansion research
      input:
        topic: "Market expansion opportunity in sector X"
        goal: "Evaluate whether to expand into market X"
        focus: "prioritize risks"
        items:
          - id: "doc-1"
            content: "Demand is growing at 15% YoY..."
            type: article
          - id: "doc-2"
            source_ref:
              type: pdf_path
              location: "/research/regulatory-analysis.pdf"
            type: report
      output:
        summary: "The expansion appears viable given demand signals but faces regulatory uncertainty and high entry cost."
        key_points:
          - "Demand growing at 15% YoY"
          - "Regulatory timeline unclear"
          - "Entry cost significantly above initial estimates"
        insights:
          - "Execution risk, not market fit, is the primary constraint"
        tensions:
          - topic: "competitive pressure"
            position_a: "Low competition observed in current data"
            position_b: "Emerging entrants signal rising competitive intensity"
        uncertainties:
          - "No consolidated data on total cost of entry"
          - "Regulatory approval timeline unconfirmed"
        next_steps:
          - "Validate regulatory timeline with legal team"
          - "Pass to decision.compare_options with entry vs defer scenarios"
        synthesis_quality:
          confidence_score: 0.72
          coverage_ratio: 0.9
          evidence_strength: 0.75
          tension_density: 0.2
          uncertainty_load: 0.3
          quality_notes: "Synthesis is well-grounded but regulatory uncertainty reduces confidence."
          assessment_passed: true
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
