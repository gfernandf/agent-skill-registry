id: doc.chunk-and-embed
version: 0.1.0
name: Chunk and Embed
description: Split text into chunks and generate embeddings for the original text.
inputs:
  text:
    type: string
    required: true
  chunk_size:
    type: number
    required: false
  overlap:
    type: number
    required: false
outputs:
  chunks:
    type: array
    required: true
  embedding:
    type: array
    required: true
steps:
- id: chunk
  uses: doc.content.chunk
  input:
    text: inputs.text
    chunk_size: inputs.chunk_size
    overlap: inputs.overlap
  output:
    chunks: outputs.chunks
- id: embed
  uses: text.content.embed
  input:
    text: inputs.text
  output:
    embedding: outputs.embedding
metadata:
  status: experimental
  classification:
    role: utility
    invocation: direct
    effect_mode: enrich
  tags:
  - document
  - chunking
  - processing
  - embedding
  - vector
  - segmentation
  use_cases:
  - Split a document into chunks and generate embeddings
  - Prepare documents for vector search indexing
  - Create semantic embeddings for document retrieval
  examples:
  - description: Chunk a document and create embeddings
    input:
      document: Long document text about market analysis...
      chunk_size: 512
    output:
      chunks:
      - id: c1
        text: Market analysis section...
        embedding_dim: 768
      total_chunks: 5
