id: agent.trace
version: 0.1.0
name: Agent Trace
description: >
  Analyze agent execution incrementally to produce structured trace state,
  decision graph views, and risk control signals during a run.
inputs:
  goal:
    type: string
    required: true
  context:
    type: object
    required: false
  events:
    type: array
    required: true
  trace_state:
    type: object
    required: false
  trace_session_id:
    type: string
    required: false
  state_mode:
    type: string
    required: false
  mode:
    type: string
    required: false
  output_views:
    type: array
    required: false
  thresholds:
    type: object
    required: false
outputs:
  trace_session_id:
    type: string
    required: true
  updated_trace_state:
    type: object
    required: true
  state_checksum:
    type: string
    required: false
  trace_version:
    type: string
    required: false
  decision_graph:
    type: object
    required: false
  assumptions:
    type: array
    required: false
  alternative_paths:
    type: array
    required: false
  confidence:
    type: number
    required: false
  risk_candidates:
    type: array
    required: false
  risk_flags:
    type: array
    required: false
  control_status:
    type: string
    required: true
  alerts:
    type: array
    required: false
  summary:
    type: string
    required: false
steps:
- id: validate_events
  uses: data.schema.validate
  input:
    data:
      events: inputs.events
    schema:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            type: object
            required: [type, timestamp]
  output:
    valid: vars.events_valid
    errors: vars.events_errors
- id: analyze_trace
  uses: ops.trace.analyze
  input:
    goal: inputs.goal
    context: inputs.context
    events: inputs.events
    trace_state: inputs.trace_state
    trace_session_id: inputs.trace_session_id
    state_mode: inputs.state_mode
    mode: inputs.mode
    output_views: inputs.output_views
  output:
    trace_session_id: outputs.trace_session_id
    updated_trace_state: outputs.updated_trace_state
    state_checksum: outputs.state_checksum
    trace_version: outputs.trace_version
    decision_graph: outputs.decision_graph
    assumptions: outputs.assumptions
    alternative_paths: outputs.alternative_paths
    confidence: outputs.confidence
    risk_candidates: outputs.risk_candidates
    summary: outputs.summary
- id: monitor_trace
  uses: ops.trace.monitor
  input:
    trace: outputs.updated_trace_state
    thresholds: inputs.thresholds
  output:
    status: outputs.control_status
    risk_flags: outputs.risk_flags
    alerts: outputs.alerts
metadata:
  status: experimental
  channel: experimental
  tags:
    - agent
    - trace
    - observability
    - control
  classification:
    role: sidecar
    invocation: attach
    attach_targets:
      - run
      - output
      - transcript
    effect_mode: control_signal
