id: audio.transcribe-summary
version: 0.1.0
name: Transcribe Summary
description: Transcribe audio and summarize the transcript.
inputs:
  audio:
    type: string
    required: true
outputs:
  transcript:
    type: string
    required: true
  summary:
    type: string
    required: true
steps:
- id: transcribe_audio
  uses: audio.speech.transcribe
  input:
    audio: inputs.audio
  output:
    transcript: outputs.transcript
- id: summarize_transcript
  uses: text.content.summarize
  input:
    text: outputs.transcript
  output:
    summary: outputs.summary
metadata:
  status: experimental
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
  tags:
  - audio
  - speech
  - transcription
  - summarization
  use_cases:
  - Transcribe an audio file and produce a text summary
  - Extract key points from a recorded meeting
  - Convert speech recordings into searchable text summaries
  examples:
  - description: Transcribe and summarize a meeting recording
    input:
      audio_path: /recordings/standup.mp3
      language: en
    output:
      transcript_snippet: Team discussed Q2 priorities...
      summary: Standup covered sprint progress, blocker on API integration, and Q2 roadmap alignment.
