id: image.caption-and-classify
version: 0.1.0
name: Caption and Classify Image
description: Generate a caption for an image and classify it.
inputs:
  image:
    type: string
    required: true
  labels:
    type: array
    required: false
outputs:
  caption:
    type: string
    required: true
  label:
    type: string
    required: true
  confidence:
    type: number
    required: false
steps:
- id: caption_image
  uses: image.caption.generate
  input:
    image: inputs.image
  output:
    caption: outputs.caption
- id: classify_image
  uses: image.content.classify
  input:
    image: inputs.image
    labels: inputs.labels
  output:
    label: outputs.label
    confidence: outputs.confidence
metadata:
  status: experimental
  classification:
    role: procedure
    invocation: direct
    effect_mode: enrich
