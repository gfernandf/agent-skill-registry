id: memory.context.compress
version: 1.0.0
description: Compress context while preserving constraints, decisions, and signals
  needed for future cognition.
inputs:
  context:
    type: object
    required: true
    description: 'Context object to summarize. Schema: object with stable keys expected
      by downstream consumers; additional keys are optional unless otherwise specified.'
  target_length:
    type: number
    required: false
    description: Approximate target summary length.
outputs:
  summary_context:
    type: object
    required: true
    description: 'Compressed context representation for reuse. Schema: object with
      stable keys expected by downstream consumers; additional keys are optional unless
      otherwise specified.'
  summary_notes:
    type: string
    required: false
    description: Notes about what information was dropped or preserved.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
cognitive_hints:
  role: synthesize
  consumes:
  - Context
  produces:
    summary_context:
      type: Context
    summary_notes:
      type: Summary
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - memory
  - context
  - summarize
  examples:
  - summary: Summarize long-running session context
  layer: cognitive
