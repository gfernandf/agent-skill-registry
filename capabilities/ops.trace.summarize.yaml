id: ops.trace.summarize
version: 1.0.0
status: experimental
description: 'Summarize an execution trace into a compact human-readable and machine-parseable
  report. Extracts the list of steps executed, key decisions made at gates, failures
  and their causes, and the overall outcome. Used by the reporter node for user-facing
  output and by post-execution audit and learning nodes.

  '
inputs:
  execution_trace:
    type: object
    required: true
    description: 'Raw execution result or trace object from agent.plan.execute. Must
      contain at minimum step_results and status.

      '
outputs:
  trace_summary:
    type: object
    required: true
    description: 'Summary object with: steps_executed (array of {step_id, ref, status,
      duration_ms}), decisions (array of {gate_id, decision, reason}), failures (array
      of {step_id, error, recovery_action}), overall_status (string), total_duration_ms
      (number), success_rate (number 0-1).

      '
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - ops
  - trace
  - audit
  - reporting
  - agent-pipeline
  examples:
  - execution_trace:
      status: success
      step_results:
      - step_id: s1_step1
        status: success
        duration_ms: 340
      - step_id: s1_step2
        status: success
        duration_ms: 180
    expected_trace_summary:
      overall_status: success
      success_rate: 1.0
  layer: cognitive
cognitive_hints:
  role: synthesize
  produces:
    trace_summary:
      type: Summary
  consumes:
  - Artifact
