id: agent.task.plan
version: 1.0.0
status: experimental
description: >
  Generate a high-level macro plan that decomposes an interpreted goal
  into major sequential or parallel stages without executing anything.
  Each stage specifies an objective, expected output type, and optionally
  a suggested skill reference from the ranked catalog. Used as input to
  agent.plan.split for step-level expansion.

inputs:
  interpreted_goal:
    type: object
    required: true
    description: >
      Interpreted goal from agent.goal.interpret.
  candidate_skills:
    type: array
    required: false
    description: >
      Ranked skill candidates from agent.catalog.rank for grounding stage
      suggestions in available registry items.
  candidate_capabilities:
    type: array
    required: false
    description: >
      Ranked capability candidates from agent.catalog.rank.
  planning_strategy:
    type: string
    required: false
    description: >
      Execution strategy hint: direct | staged | exploratory |
      approval_required | human_in_loop. Defaults to staged.

outputs:
  macro_plan:
    type: object
    required: true
    description: >
      Macro plan object with fields: goal_ref (string),
      strategy (string), stages (array of {id, objective,
      expected_output, suggested_skill, parallel_with}).
  stage_count:
    type: number
    required: false
    description: Number of macro stages in the plan.

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  tags:
    - planning
    - macro-planning
    - agent-pipeline
  examples:
    - interpreted_goal:
        objective: "Create a sourced briefing on EU green hydrogen regulation"
      expected_macro_plan:
        stages:
          - id: "s1"
            objective: "Search and retrieve relevant regulatory sources"
          - id: "s2"
            objective: "Synthesize findings into structured briefing"

cognitive_hints:
  role: synthesize
  produces:
    macro_plan:
      type: Plan
    stage_count:
      type: Score
  consumes:
    - Artifact
    - Option
