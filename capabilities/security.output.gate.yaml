id: security.output.gate
version: 1.0.0
description: Apply policy gates to decide whether an output can be released.
inputs:
  output:
    type: object
    required: true
    description: Output artifact to gate.
  policy:
    type: object
    required: true
    description: Gating policy definition.
outputs:
  allowed:
    type: boolean
    required: true
    description: Whether output is allowed.
  decision:
    type: string
    required: false
    description: Canonical decision outcome (allow, deny, conditional_allow, escalate).
  reasons:
    type: array
    required: false
    description: Reasons for blocking or warnings.
  rationale:
    type: string
    required: false
    description: Human-readable rationale for the gate decision.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the gate decision.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: strict
metadata:
  status: stable
  tags:
  - security
  - policy-gate
  - output-control
  examples:
  - output:
      text: Contact john@acme.com for details
    policy:
      block_pii: true
      block_secrets: false
    expected_allowed: false
    expected_decision: deny
  layer: governance
cognitive_hints:
  role: evaluate
  produces:
    allowed:
      type: Decision
    decision:
      type: Decision
    reasons:
      type: Score
    rationale:
      type: Evidence
    evidence:
      type: Evidence
  consumes:
  - Context
