id: doc.content.chunk
version: 1.0.0
description: Split a document or text into chunks.
inputs:
  text:
    type: string
    required: true
    description: Document text.
  chunk_size:
    type: number
    required: false
    description: Optional chunk size.
  overlap:
    type: number
    required: false
    description: Optional overlap size.
outputs:
  chunks:
    type: array
    required: true
    description: Document chunks.
properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [document, processing, chunking]
  examples:
    - summary: "Split a document into chunks"
      inputs:
        text: "A long document..."
        chunk_size: 500
      outputs:
        chunks: ["A long doc...", "ument continued..."]

cognitive_hints:
  role: perceive
  produces:
    chunks:
      type: Entity
  consumes:
  - Artifact
