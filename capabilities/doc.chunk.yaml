id: doc.chunk
version: 1.0.0
description: Split a document or text into chunks.
inputs:
  text:
    type: string
    required: true
    description: Document text.
  chunk_size:
    type: number
    required: false
    description: Optional chunk size.
  overlap:
    type: number
    required: false
    description: Optional overlap size.
outputs:
  chunks:
    type: array
    required: true
    description: Document chunks.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
