id: task.sla.monitor
version: 1.0.0
description: Monitor SLA compliance for a set of tasks and raise alerts for breaches.

inputs:
  tasks:
    type: array
    required: true
    description: List of tasks with created_at, priority, and status fields.
  sla_rules:
    type: object
    required: true
    description: SLA rules mapping priority to max_resolution_hours.

outputs:
  compliant:
    type: array
    required: true
    description: Tasks within SLA.
  breached:
    type: array
    required: true
    description: Tasks that have breached SLA.
  at_risk:
    type: array
    required: true
    description: Tasks approaching SLA breach (within 80% of limit).

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [task, sla, monitoring, compliance]


  examples:
    - summary: "Monitor SLA compliance"
      inputs:
        tasks: [{id: "CASE-1", priority: "high", state: "open"}]
        sla_rules: [{priority: "high", max_resolution_hours: 4}]
      outputs:
        compliant: []
        breached: ["CASE-1"]
        at_risk: []

cognitive_hints:
  role: perceive
  produces:
    compliant:
      type: Entity
    breached:
      type: Entity
    at_risk:
      type: Entity
  consumes:
  - Entity
