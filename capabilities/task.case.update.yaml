id: task.case.update
version: 1.0.0
description: Update fields of an existing case.

inputs:
  case_id:
    type: string
    required: true
    description: Identifier of the case to update.
  fields:
    type: object
    required: true
    description: Fields to update with new values.

outputs:
  updated:
    type: boolean
    required: true
    description: Whether the case was updated.

properties:
  deterministic: false
  side_effects: true
  idempotent: true

safety:
  trust_level: standard
  requires_confirmation: false
  description: Updates a case in the in-memory store.

metadata:
  status: stable
  tags: [task, case, update]


  examples:
    - summary: "Update a case's fields"
      inputs:
        case_id: "CASE-1"
        fields: {priority: "critical"}
      outputs:
        updated: true

cognitive_hints:
  role: act
  produces:
    updated:
      type: Entity
  consumes:
  - Entity
