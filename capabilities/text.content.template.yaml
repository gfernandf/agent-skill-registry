id: text.content.template
version: 1.0.0
description: Render a text template using variables.

inputs:
  template:
    type: string
    required: true

  variables:
    type: object
    required: true

outputs:
  text:
    type: string

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [text, template, utility]