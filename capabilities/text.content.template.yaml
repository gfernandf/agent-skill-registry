id: text.content.template
version: 1.0.0
description: Render a text template using variables.

inputs:
  template:
    type: string
    required: true

  variables:
    type: object
    required: true

outputs:
  text:
    type: string

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [text, template, utility]
  examples:
    - summary: "Render a template with variables"
      inputs:
        template: "Hello {{name}}, welcome to {{place}}!"
        variables: {name: "Alice", place: "HQ"}
      outputs:
        text: "Hello Alice, welcome to HQ!"

cognitive_hints:
  role: act
  produces:
    text:
      type: Artifact
  consumes:
  - Context
