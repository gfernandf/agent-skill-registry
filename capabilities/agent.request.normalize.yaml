id: agent.request.normalize
version: 1.0.0
status: experimental
description: "Normalize a raw user request into a structured task object. Extracts\
  \ intent, language, explicit constraints, urgency level, and attached artifacts.\
  \ Does not plan or execute \u2014 only converts the input into a machine-usable\
  \ form for downstream goal interpretation and planning nodes.\n"
inputs:
  user_message:
    type: string
    required: true
    description: 'Raw user message text to normalize.

      '
  context:
    type: object
    required: false
    description: 'Conversation or session context including prior messages, user profile,
      and runtime metadata.

      '
outputs:
  normalized_request:
    type: object
    required: true
    description: 'Structured request object with fields: raw_request (string), language
      (string), detected_intent (string), explicit_constraints (array of strings),
      urgency (low|medium|high), requires_external_action (boolean), attachments (array).

      '
  language:
    type: string
    required: false
    description: 'ISO 639-1 language code detected from the user message.

      '
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - intake
  - normalization
  - agent-pipeline
  examples:
  - user_message: Make me a briefing on EU green hydrogen regulation
    expected_normalized_request:
      detected_intent: research_and_synthesize
      urgency: medium
      requires_external_action: false
  layer: cognitive
cognitive_hints:
  role: synthesize
  produces:
    normalized_request:
      type: Artifact
    language:
      type: Artifact
  consumes:
  - Message
