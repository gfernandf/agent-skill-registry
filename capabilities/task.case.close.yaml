id: task.case.close
version: 1.0.0
description: Close a case or ticket with a resolution.

inputs:
  case_id:
    type: string
    required: true
    description: Identifier of the case to close.
  resolution:
    type: string
    required: false
    description: Resolution description.

outputs:
  closed:
    type: boolean
    required: true
    description: Whether the case was closed.
  timestamp:
    type: string
    required: true
    description: ISO-8601 timestamp.

properties:
  deterministic: true
  side_effects: true
  idempotent: true

safety:
  trust_level: standard
  requires_confirmation: false
  description: Closes a case in the in-memory store.

metadata:
  status: experimental
  tags: [task, case, close]


  examples:
    - summary: "Close a case with a resolution"
      inputs:
        case_id: "CASE-1"
        resolution: "Fixed in v2.1"
      outputs:
        closed: true

cognitive_hints:
  role: act
  produces:
    closed:
      type: Entity
    timestamp:
      type: Entity
  consumes:
  - Entity
