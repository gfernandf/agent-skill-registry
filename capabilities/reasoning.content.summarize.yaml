id: reasoning.content.summarize
version: 1.0.0
description: Produce a condensed version of text while preserving key ideas and intent.
  Returns a compact artifact suitable for review, indexing, or downstream synthesis.
inputs:
  text:
    type: string
    required: true
    description: Source text to summarize.
  max_length:
    type: integer
    required: false
    description: Optional maximum summary length in words.
outputs:
  summary:
    type: string
    required: true
    description: Condensed summary preserving the key ideas from the input text.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
cognitive_hints:
  role: synthesize
  consumes:
  - Context
  produces:
    summary:
      type: Summary
metadata:
  status: stable
  tags:
  - text
  - nlp
  - summarization
  examples:
  - summary: Summarize a passage of text
    inputs:
      text: Machine learning is a subset of AI that enables systems to learn from
        data...
    outputs:
      summary: ML lets systems learn from data without explicit programming.
  layer: cognitive
