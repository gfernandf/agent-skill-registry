id: identity.permission.evaluate
version: 1.0.0
description: Evaluate access suitability by combining permission context, action/resource metadata, policy references, and risk signals.
inputs:
  principal:
    type: object
    required: true
    description: Principal context (id, type, roles, attributes).
  action:
    type: object
    required: true
    description: Requested action metadata.
  resource:
    type: object
    required: true
    description: Target resource metadata and sensitivity hints.
  context:
    type: object
    required: false
    description: Runtime context (session, channel, time, environment).
  policy_refs:
    type: array
    required: false
    description: Policy references considered during evaluation.
outputs:
  decision:
    type: string
    required: true
    description: 'Decision outcome: allow, deny, conditional_allow, escalate, or transform.'
  conditions:
    type: array
    required: false
    description: Conditions that must be met before execution.
  rationale:
    type: string
    required: true
    description: Human-readable reason for the decision.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the decision.
  risk:
    type: object
    required: false
    description: Aggregated risk signals relevant to the decision.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: strict
metadata:
  status: experimental
  tags:
  - identity
  - permission
  - evaluation
  - authorization
  - governance
  examples:
  - summary: Conditional allow for sensitive export
    inputs:
      principal:
        id: analyst-1
      action:
        type: export
      resource:
        id: customer-report
    outputs:
      decision: conditional_allow
      conditions:
      - require_additional_approval
      rationale: Additional approval required for sensitive export.
  layer: governance
cognitive_hints:
  role: evaluate
  produces:
    decision:
      type: Decision
    evidence:
      type: Evidence
    risk:
      type: Score
  consumes:
  - Context
  - Evidence
  - Entity
