id: reasoning.task.decompose
version: 1.0.0
status: experimental
description: Decompose a task into coherent sub-tasks, dependencies, and execution
  units.
inputs:
  interpreted_goal:
    type: object
    required: true
    description: 'Interpreted goal from reasoning.goal.interpret.

      '
  candidate_skills:
    type: array
    required: false
    description: 'Ranked skill candidates from evaluation.catalog.rank for grounding
      stage suggestions in available registry items.

      '
  candidate_capabilities:
    type: array
    required: false
    description: 'Ranked capability candidates from evaluation.catalog.rank.

      '
  planning_strategy:
    type: string
    required: false
    description: 'Execution strategy hint: direct | staged | exploratory | approval_required
      | human_in_loop. Defaults to staged.

      '
outputs:
  macro_plan:
    type: object
    required: true
    description: 'Macro plan object with fields: goal_ref (string), strategy (string),
      stages (array of {id, objective, expected_output, suggested_skill, parallel_with}).

      '
  stage_count:
    type: number
    required: false
    description: Number of macro stages in the plan.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - planning
  - macro-planning
  - agent-pipeline
  examples:
  - interpreted_goal:
      objective: Create a sourced briefing on EU green hydrogen regulation
    expected_macro_plan:
      stages:
      - id: s1
        objective: Search and retrieve relevant regulatory sources
      - id: s2
        objective: Synthesize findings into structured briefing
  layer: cognitive
  status: deprecated
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
cognitive_hints:
  role: synthesize
  produces:
    macro_plan:
      type: Plan
    stage_count:
      type: Score
  consumes:
  - Artifact
  - Option
replacement: reasoning.problem.decompose
