id: reasoning.plan.split
version: 1.0.0
status: stable
description: 'Expand one macro plan stage into concrete ORCA-executable steps. Each
  step references a specific capability or skill by registry ID, specifies its purpose,
  expected inputs and outputs, and declares inter-step dependencies. Output is a flat
  list of typed steps ready for input binding and validation.

  '
inputs:
  macro_stage:
    type: object
    required: true
    description: 'Single stage object from reasoning.task.plan macro_plan.stages.
      Schema: object with stable keys expected by downstream consumers; additional
      keys are optional unless otherwise specified.'
  candidate_skills:
    type: array
    required: false
    description: 'Ranked skill candidates available for step assignment. Schema: array
      of items with a stable item structure expected by downstream consumers.'
  candidate_capabilities:
    type: array
    required: false
    description: 'Ranked capability candidates available for step assignment. Schema:
      array of items with a stable item structure expected by downstream consumers.'
  current_state:
    type: object
    required: false
    description: 'Current CognitiveState snapshot, used to infer which inputs are
      already available from prior steps. Schema: object with stable keys expected
      by downstream consumers; additional keys are optional unless otherwise specified.'
outputs:
  expanded_steps:
    type: array
    required: true
    description: 'Array of concrete step objects, each with: id (string), type (skill|capability),
      ref (string), purpose (string), inputs (object with placeholder paths), outputs
      (object), depends_on (array of step ids).

      '
  step_count:
    type: number
    required: false
    description: Number of steps produced for this stage.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - planning
  - plan-expansion
  - agent-pipeline
  examples:
  - macro_stage:
      id: s1
      objective: Search and retrieve relevant regulatory sources
    expected_expanded_steps:
    - id: s1_step1
      ref: web.source.search
      type: capability
  layer: cognitive
  status: deprecated
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
cognitive_hints:
  role: synthesize
  produces:
    expanded_steps:
      type: Plan
    step_count:
      type: Score
  consumes:
  - Plan
  - Option
replacement: reasoning.plan.decompose
