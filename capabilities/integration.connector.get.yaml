id: integration.connector.get
version: 1.0.0
description: Retrieve metadata for a specific connector by identifier.

inputs:
  connector_id:
    type: string
    required: true
    description: Unique identifier of the connector.

outputs:
  connector:
    type: object
    required: true
    description: Connector metadata including id, name, type, and status.
  found:
    type: boolean
    required: true
    description: Whether the connector was found.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: experimental
  tags: [integration, connector, lookup]


  examples:
    - summary: "Retrieve connector metadata"
      inputs:
        connector_id: "crm-rest"
      outputs:
        connector: {id: "crm-rest", type: "rest", status: "active"}
        found: true