id: text.content.embed
version: 1.0.0
description: Generate vector embeddings from text.
inputs:
  text:
    type: string
    required: true
    description: Input text.
outputs:
  embedding:
    type: array
    required: true
    description: Generated embedding vector.
properties:
  deterministic: false
  side_effects: false
  idempotent: true


metadata:
  status: experimental
  tags: [text, nlp, embedding, vector]
  examples:
    - summary: "Generate a vector embedding for text"
      inputs:
        text: "This is a test sentence."
      outputs:
        vector: [0.01, -0.03, 0.12]

cognitive_hints:
  role: act
  produces:
    embedding:
      type: Artifact
  consumes:
  - Context
