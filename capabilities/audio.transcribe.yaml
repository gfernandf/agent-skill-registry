id: audio.transcribe
version: 1.0.0
description: Convert speech audio to text.
inputs:
  audio:
    type: string
    required: true
    description: Audio input or path.
outputs:
  transcript:
    type: string
    required: true
    description: Generated transcript.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
