id: reasoning.criteria.define
version: 1.0.0
status: stable
description: 'Define measurable success, quality, and acceptance criteria for an interpreted
  goal. Produces the evaluation contract that plan validation and output evaluation
  nodes use to determine whether the task has been completed correctly and completely.

  '
inputs:
  interpreted_goal:
    type: object
    required: true
    description: 'Operational goal object produced by reasoning.goal.interpret. Schema:
      object with stable keys expected by downstream consumers; additional keys are
      optional unless otherwise specified.'
outputs:
  success_criteria:
    type: array
    required: true
    description: 'Array of measurable conditions that must all be met for the task
      to be considered successful.

      '
  quality_criteria:
    type: array
    required: false
    description: 'Array of quality dimensions and thresholds that outputs must satisfy
      (e.g. accuracy, completeness, source coverage).

      '
  acceptance_criteria:
    type: array
    required: false
    description: 'Array of conditions the final deliverable must meet from the stakeholder
      perspective.

      '
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - criteria
  - goal-setting
  - agent-pipeline
  examples:
  - interpreted_goal:
      objective: Create a sourced briefing on EU green hydrogen regulation
    expected_success_criteria:
    - Document includes at least one EU regulatory reference
    - All claims are supported by cited sources
    - Uncertainties are explicitly labelled
  layer: cognitive
cognitive_hints:
  role: synthesize
  produces:
    success_criteria:
      type: Criterion
    quality_criteria:
      type: Criterion
    acceptance_criteria:
      type: Criterion
  consumes:
  - Artifact
