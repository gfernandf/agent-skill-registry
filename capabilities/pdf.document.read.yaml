id: pdf.document.read
version: 1.0.0
description: Read a PDF document and extract textual content.

requires:
  - fs.file.read
  
inputs:
  path:
    type: string
    required: true

outputs:
  text:
    type: string

  metadata:
    type: object

metadata:
  status: experimental
  tags: [pdf, document, read, input]
  examples:
    - summary: "Read text from a PDF document"
      inputs:
        path: "reports/q3.pdf"
      outputs:
        text: "Q3 revenue increased..."
        metadata: {pages: 5}

cognitive_hints:
  role: perceive
  produces:
    text:
      type: Entity
    metadata:
      type: Entity
  consumes:
  - Context
