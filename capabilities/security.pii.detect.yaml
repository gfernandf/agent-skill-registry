id: security.pii.detect
version: 1.0.0
description: Detect personally identifiable information in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to inspect.
outputs:
  contains_pii:
    type: boolean
    required: true
    description: Whether PII was detected.
  findings:
    type: array
    required: false
    description: Detected PII findings with types and spans.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the detection.
  rationale:
    type: string
    required: false
    description: Human-readable explanation of the detection result.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: strict
metadata:
  status: stable
  tags:
  - security
  - pii
  - detection
  examples:
  - text: Email me at john.doe@example.com or call +1 650 555 1234
    expected_contains_pii: true
    expected_rationale: Email and phone number patterns detected.
  layer: governance
cognitive_hints:
  role: act
  produces:
    contains_pii:
      type: Entity
    findings:
      type: Entity
    evidence:
      type: Evidence
    rationale:
      type: Evidence
  consumes:
  - Context
