id: security.pii.detect
version: 1.0.0
description: Detect personally identifiable information in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to inspect.
outputs:
  contains_pii:
    type: boolean
    required: true
    description: Whether PII was detected.
  findings:
    type: array
    required: false
    description: Detected PII findings with types and spans.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: strict
safety:
  trust_level: standard
  allowed_targets:
  - same_tenant
  description: PII detection must remain scoped to the caller tenant.
metadata:
  status: stable
  tags:
  - security
  - pii
  - detection
  examples:
  - text: Email me at john.doe@example.com or call +1 650 555 1234
    expected_contains_pii: true
  layer: governance
cognitive_hints:
  role: act
  produces:
    contains_pii:
      type: Entity
    findings:
      type: Entity
  consumes:
  - Context
