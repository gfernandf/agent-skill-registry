id: agent.plan.reconcile
version: 1.0.0
status: experimental
description: 'Repair an invalid ORCA plan based on validation errors. Repairs include:
  replacing unresolvable capability or skill references with closest valid alternatives,
  inserting missing inter-step dependencies, resolving unbound input paths, adding
  missing policy gates on high-risk steps, and removing or flagging steps that are
  structurally incompatible with the goal. Returns the repaired plan and a list of
  repair notes for audit.

  '
inputs:
  invalid_plan:
    type: object
    required: true
    description: 'Plan object that failed agent.plan.validate.

      '
  validation_errors:
    type: array
    required: true
    description: 'Error list from validation_result.errors produced by agent.plan.validate.

      '
  registry:
    type: object
    required: false
    description: 'Registry snapshot for resolving replacement references.

      '
outputs:
  repaired_plan:
    type: object
    required: true
    description: 'Plan object with corrections applied. Must be re-validated before
      compilation.

      '
  repair_notes:
    type: array
    required: true
    description: 'Array of repair note objects, each with: step_id (string), action
      (string), original (string), replacement (string).

      '
  still_invalid:
    type: boolean
    required: false
    description: 'True when one or more errors could not be automatically repaired
      and require manual intervention.

      '
properties:
  deterministic: false
  side_effects: false
  idempotent: false
  state_access: none
  audit_level: standard
metadata:
  tags:
  - governance
  - plan-repair
  - agent-pipeline
  examples:
  - invalid_plan:
      bound_steps:
      - id: s1_step1
        ref: web.source.fetch
    validation_errors:
    - step_id: s1_step1
      check: ref_exists
      message: Capability 'web.source.fetch' not found in registry
    expected_repair_notes:
    - step_id: s1_step1
      action: replace_ref
      original: web.source.fetch
      replacement: web.page.fetch
  layer: cognitive
cognitive_hints:
  role: synthesize
  produces:
    repaired_plan:
      type: Plan
    repair_notes:
      type: Evidence
    still_invalid:
      type: Evidence
  consumes:
  - Plan
  - Risk
  - Context
