id: evaluation.response.score
version: 1.0.0
description: Score a model-generated response on multiple quality dimensions such
  as relevance, fluency, completeness, and faithfulness.
inputs:
  output:
    type: object
    required: true
    description: 'The model-generated output to score. Schema: object with stable
      keys expected by downstream consumers; additional keys are optional unless otherwise
      specified.'
  instruction:
    type: string
    required: true
    description: The original instruction that produced the output.
  reference:
    type: object
    required: false
    description: 'Optional reference or ground truth to compare against. Schema: object
      with stable keys expected by downstream consumers; additional keys are optional
      unless otherwise specified.'
  dimensions:
    type: array
    required: false
    description: 'Quality dimensions to evaluate. Defaults to [''relevance'', ''fluency'',
      ''completeness'', ''faithfulness'']. Schema: array of items with a stable item
      structure expected by downstream consumers.'
outputs:
  scores:
    type: object
    required: true
    description: "Mapping of dimension name to score (0.0\u20131.0). Schema: object\
      \ with stable keys expected by downstream consumers; additional keys are optional\
      \ unless otherwise specified."
  overall:
    type: number
    required: true
    description: Weighted overall quality score between 0.0 and 1.0.
  rationale:
    type: string
    required: false
    description: Human-readable summary of the scoring rationale.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - model
  - quality
  - scoring
  - evaluation
  examples:
  - summary: Score a generated summary on quality dimensions
    inputs:
      output:
        summary: Cloud revenue drove 15% growth.
      instruction: Summarize the quarterly financial results
      dimensions:
      - relevance
      - fluency
      - completeness
  layer: cognitive
cognitive_hints:
  role: evaluate
  produces:
    scores:
      type: Score
    overall:
      type: Score
    rationale:
      type: Evidence
  consumes:
  - Context
