id: model.output.generate
version: 1.0.0
description: Generate structured output from a model given an instruction, context items, and an output schema.

inputs:
  instruction:
    type: string
    required: true
    description: Natural language instruction describing what to generate.

  context_items:
    type: array
    required: true
    description: List of input items providing evidence or context. Each item may include id, content, type, and optional metadata.

  output_schema:
    type: object
    required: true
    description: JSON Schema describing the expected output structure.

  detail_level:
    type: string
    required: false
    description: "Output depth hint: brief | standard | detailed. Defaults to standard."

  constraints:
    type: object
    required: false
    description: Optional execution constraints such as no_fabrication, evidence_required, or max_tokens.

outputs:
  output:
    type: object
    required: true
    description: Generated structured output conforming to output_schema.

  warnings:
    type: array
    required: false
    description: Optional list of warnings about low-evidence claims or inferences.

  coverage:
    type: object
    required: false
    description: Coverage metadata including processed_items count and ignored_items count.

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [model, generation, structured-output, llm]
  examples:
    - summary: Generate a risk assessment from meeting notes
      inputs:
        instruction: "Produce a risk assessment from the meeting notes."
        context_items: [{"id": "1", "content": "Budget overrun likely in Q3.", "type": "note"}]
        output_schema: {"type": "object", "properties": {"risks": {"type": "array"}, "severity": {"type": "string"}}}
        detail_level: standard


cognitive_hints:
  role: synthesize
  produces:
    output:
      type: Entity
    warnings:
      type: Entity
    coverage:
      type: Entity
  consumes:
  - Context
