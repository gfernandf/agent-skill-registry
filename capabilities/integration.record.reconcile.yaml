id: integration.record.reconcile
version: 1.0.0
description: Reconcile records between two systems and report discrepancies.

inputs:
  records_a:
    type: array
    required: true
    description: Records from system A.
  records_b:
    type: array
    required: true
    description: Records from system B.
  key_field:
    type: string
    required: true
    description: Field name to use as the record identity key.

outputs:
  matched:
    type: array
    required: true
    description: Records present in both systems.
  only_a:
    type: array
    required: true
    description: Records only in system A.
  only_b:
    type: array
    required: true
    description: Records only in system B.
  discrepancies:
    type: array
    required: true
    description: Records present in both but with field-level differences.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [integration, record, reconciliation]


  examples:
    - summary: "Reconcile records between two systems"
      inputs:
        records_a: [{id: "1"}]
        records_b: [{id: "2"}]
        key_field: "id"
      outputs:
        matched: []
        only_a: [{id: "1"}]
        only_b: [{id: "2"}]

cognitive_hints:
  role: analyze
  produces:
    matched:
      type: Entity
    only_a:
      type: Entity
    only_b:
      type: Entity
    discrepancies:
      type: Entity
  consumes:
  - Entity
