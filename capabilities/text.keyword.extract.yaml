id: text.keyword.extract
version: 1.0.0
description: Extract keywords from a text block.

inputs:
  text:
    type: string
    required: true
    description: Source text to analyze.

outputs:
  keywords:
    type: array
    required: true
    description: Extracted keywords.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [text, nlp, extraction]
  examples:
    - summary: "Extract keywords from text"
      inputs:
        text: "Python is great for machine learning and data science."
      outputs:
        keywords: ["Python", "machine learning", "data science"]

cognitive_hints:
  role: perceive
  produces:
    keywords:
      type: Entity
  consumes:
  - Context
