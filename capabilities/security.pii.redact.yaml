id: security.pii.redact
version: 1.0.0
description: Redact personally identifiable information in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to redact.
outputs:
  redacted_text:
    type: string
    required: true
    description: Redacted text output.
  findings:
    type: array
    required: false
    description: Redaction findings with type metadata.
properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags:
    - security
    - pii
    - redaction
  examples:
    - text: "Contact john.doe@example.com for the report"
      expected_redacted_text: "Contact REDACTED_EMAIL for the report"

cognitive_hints:
  role: act
  produces:
    redacted_text:
      type: Entity
    findings:
      type: Entity
  consumes:
  - Context
