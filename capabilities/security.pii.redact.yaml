id: security.pii.redact
version: 1.0.0
description: Redact personally identifiable information in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to redact.
outputs:
  redacted_text:
    type: string
    required: true
    description: Redacted text output.
  findings:
    type: array
    required: false
    description: Redaction findings with type metadata.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the redaction.
  rationale:
    type: string
    required: false
    description: Human-readable explanation of the redaction result.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: strict
metadata:
  status: stable
  tags:
  - security
  - pii
  - redaction
  examples:
  - text: Contact john.doe@example.com for the report
    expected_redacted_text: Contact REDACTED_EMAIL for the report
    expected_rationale: Email address redacted.
  layer: governance
cognitive_hints:
  role: act
  produces:
    redacted_text:
      type: Entity
    findings:
      type: Entity
    evidence:
      type: Evidence
    rationale:
      type: Evidence
  consumes:
  - Context
