id: text.content.extract
version: 1.0.0
description: Extract relevant text content from an input text block.

inputs:
  text:
    type: string
    required: true
    description: Source text to process.

outputs:
  text:
    type: string
    required: true
    description: Extracted or cleaned text content.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [text, extraction, preprocessing]
  examples:
    - summary: "Extract clean text from HTML"
      inputs:
        text: "<html><body><h1>Title</h1><p>Content.</p></body></html>"
      outputs:
        text: "Title
Content."

cognitive_hints:
  role: perceive
  produces:
    text:
      type: Entity
  consumes:
  - Context
