id: reasoning.priority.classify
version: 1.0.0
description: Classify task priority from attributes, urgency signals, and contextual
  constraints. Returns prioritization labels that support triage, scheduling, and
  escalation workflows.
inputs:
  task:
    type: object
    required: true
    description: Task object with title, description, type, and optional urgency signals.
  context:
    type: object
    required: false
    description: 'Contextual information such as SLA tier or impacted users. Schema:
      object with stable keys expected by downstream consumers; additional keys are
      optional unless otherwise specified.'
outputs:
  priority:
    type: string
    required: true
    description: 'Classified priority: critical, high, medium, or low.'
  confidence:
    type: number
    required: true
    description: "Confidence score (0.0\u20131.0)."
  rationale:
    type: string
    required: true
    description: Explanation of the classification.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - task
  - priority
  - classification
  - triage
  examples:
  - summary: Classify priority of a task
    inputs:
      task:
        title: DB running out of disk
        type: incident
      context:
        environment: production
    outputs:
      priority: critical
      confidence: 0.9
  layer: cognitive
cognitive_hints:
  role: analyze
  produces:
    priority:
      type: Entity
    confidence:
      type: Score
    rationale:
      type: Evidence
  consumes:
  - Entity
