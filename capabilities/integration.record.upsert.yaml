id: integration.record.upsert
version: 1.0.0
description: Create or update a record in an external system, depending on whether it exists.

inputs:
  connector_id:
    type: string
    required: true
    description: Identifier of the target connector.
  record:
    type: object
    required: true
    description: Record data. Must include an id field for match detection.

outputs:
  action:
    type: string
    required: true
    description: "Action taken: created or updated."
  record_id:
    type: string
    required: true
    description: Identifier of the created or updated record.

properties:
  deterministic: false
  side_effects: true
  idempotent: true

safety:
  trust_level: standard
  requires_confirmation: false
  description: Creates or updates a record in a mock in-memory store.

metadata:
  status: stable
  tags: [integration, record, upsert]


  examples:
    - summary: "Create-or-update a record in an external system"
      inputs:
        connector_id: "crm-rest"
        record: {id: "rec-001", name: "Updated"}
        key_fields: ["id"]
      outputs:
        upserted: true
        action: "updated"

cognitive_hints:
  role: act
  produces:
    action:
      type: Entity
    record_id:
      type: Entity
  consumes:
  - Entity
