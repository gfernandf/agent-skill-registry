id: evaluation.assumption.validate
version: 1.0.0
description: Validate assumptions for plausibility, internal consistency, and evidentiary
  support. Produces structured validation outcomes that can be reused across planning,
  analysis, and decision workflows without domain-specific coupling.
inputs:
  assumptions:
    type: array
    required: true
    description: 'Assumptions to validate. Schema: array of items with a stable item
      structure expected by downstream consumers.'
  evidence:
    type: array
    required: false
    description: 'Supporting or contradicting evidence. Schema: array of items with
      a stable item structure expected by downstream consumers.'
outputs:
  validated_assumptions:
    type: array
    required: true
    description: 'Validation results with status(supported|weak|rejected) and rationale.
      Schema: array of items with a stable item structure expected by downstream consumers.'
  confidence_summary:
    type: string
    required: false
    description: Overall confidence summary.
cognitive_hints:
  role: evaluate
  consumes:
  - Hypothesis
  - Evidence
  produces:
    validated_assumptions:
      type: Score
    confidence_summary:
      type: Summary
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - assumption
  - validation
  - evaluation
  examples:
  - summary: Validate market demand assumptions
  layer: cognitive
