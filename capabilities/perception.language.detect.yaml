id: perception.language.detect
version: 1.0.0
description: Detect the language of input content as a perception signal. Produces
  language metadata that supports localization, translation routing, and policy controls
  in multilingual workflows.
inputs:
  text:
    type: string
    required: true
    description: Text to analyze.
outputs:
  language:
    type: string
    required: true
    description: Detected language.
  confidence:
    type: number
    required: false
    description: Optional confidence score.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - text
  - nlp
  - detection
  examples:
  - summary: Detect the language of a text
    inputs:
      text: Bonjour le monde
    outputs:
      language: fr
      confidence: 0.98
  layer: cognitive
cognitive_hints:
  role: act
  produces:
    language:
      type: Artifact
    confidence:
      type: Score
  consumes:
  - Context
