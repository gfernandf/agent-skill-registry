id: evidence.gap.detect
version: 1.0.0
description: Detect missing evidence required to support claims or decisions. Surfaces
  explicit coverage gaps and missing support links so investigative and evaluation
  pipelines can prioritize targeted evidence collection.
inputs:
  claims:
    type: array
    required: true
    description: 'Claims that require support. Schema: array of items with a stable
      item structure expected by downstream consumers.'
  evidence_items:
    type: array
    required: false
    description: 'Available evidence corpus. Schema: array of items with a stable
      item structure expected by downstream consumers.'
  required_dimensions:
    type: array
    required: false
    description: 'Optional required evidence dimensions. Schema: array of items with
      a stable item structure expected by downstream consumers.'
outputs:
  evidence_gaps:
    type: array
    required: true
    description: 'Identified evidence gaps with missing dimension and impact. Schema:
      array of items with a stable item structure expected by downstream consumers.'
  gap_severity:
    type: string
    required: false
    description: Overall gap severity low|medium|high.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
cognitive_hints:
  role: analyze
  consumes:
  - Evidence
  - Context
  produces:
    evidence_gaps:
      type: Uncertainty
    gap_severity:
      type: Score
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - evidence
  - gap
  - detection
  examples:
  - summary: Find unsupported claims in strategy memo
  layer: cognitive
