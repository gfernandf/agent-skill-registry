id: audio.speech.transcribe
version: 1.0.0
description: Convert speech audio to text.
inputs:
  audio:
    type: string
    required: true
    description: Audio input or path.
outputs:
  transcript:
    type: string
    required: true
    description: Generated transcript.
properties:
  deterministic: false
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [audio, speech, transcription, speech-to-text]
  examples:
    - summary: "Transcribe a short speech clip"
      inputs:
        audio: "(binary audio data)"
      outputs:
        text: "Hello, welcome to the meeting."

cognitive_hints:
  role: perceive
  produces:
    transcript:
      type: Entity
  consumes:
  - Artifact
