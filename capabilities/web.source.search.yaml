id: web.source.search
version: 1.0.0
description: Search the web for sources matching a query.
inputs:
  query:
    type: string
    required: true
    description: Search query.
  limit:
    type: number
    required: false
    description: Optional maximum number of results.
outputs:
  results:
    type: array
    required: true
    description: Search results.

cognitive_hints:
  role: perceive
  produces:
    results:
      type: Evidence
      merge: append

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: experimental
  tags: [web, search, discovery]
  examples:
    - description: Search for machine learning resources
      inputs:
        query: "machine learning tutorials"
        limit: 5
      outputs:
        results:
          - url: "https://example.com/ml-tutorial"
            title: "ML Tutorial"
            snippet: "An introduction to machine learning."
