id: reasoning.problem.decompose
version: 1.0.0
description: Decompose a problem into structured sub-problems, dependencies, and analysis
  units. Produces reusable decomposition artifacts for planning, hypothesis generation,
  and iterative resolution.
inputs:
  problem:
    type: string
    required: true
    description: 'The problem or topic to decompose. Should be a clear statement of
      what needs to be broken down.

      '
  strategy:
    type: string
    required: true
    description: 'Decomposition axis: themes | dimensions | phases | questions | stakeholders
      | risks. Determines how the problem is sliced.

      '
  context:
    type: string
    required: false
    description: 'Background information that helps ground the decomposition.

      '
  max_components:
    type: number
    required: false
    description: 'Maximum number of components to generate. Defaults to 6. Hard cap
      at 10.

      '
outputs:
  components:
    type: array
    required: true
    description: 'List of components. Each has: id (short slug), label, description
      (what it covers), dependencies (array of other component ids it depends on),
      and analysis_order (suggested position in the analysis sequence).

      '
  gaps:
    type: array
    required: false
    description: "Areas that may be missing from the decomposition \u2014 known unknowns.\
      \ Schema: array of items with a stable item structure expected by downstream\
      \ consumers."
  overlaps:
    type: array
    required: false
    description: 'Potential overlaps between components that the analyst should watch
      for. Schema: array of items with a stable item structure expected by downstream
      consumers.'
  decomposition_notes:
    type: string
    required: false
    description: 'Brief note on the decomposition rationale and any trade-offs made.

      '
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
cognitive_hints:
  role: analyze
  consumes:
  - Context
  produces:
    components:
      type: Entity
    gaps:
      type: Risk
    overlaps:
      type: Risk
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  status: stable
  tags:
  - analysis
  - decomposition
  - structuring
  examples:
  - summary: Decompose cloud migration project by phases
    inputs:
      problem: Migrate on-premise ERP to AWS
      strategy: phases
    outputs:
      components:
      - id: c1
        label: Assessment & inventory
        analysis_order: 1
      - id: c2
        label: Architecture design
        analysis_order: 2
  layer: cognitive
