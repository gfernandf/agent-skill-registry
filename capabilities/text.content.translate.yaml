id: text.content.translate
version: 1.0.0
description: Translate text from one language to another.
inputs:
  text:
    type: string
    required: true
    description: Text to translate.
  target_language:
    type: string
    required: true
    description: Target language.
  source_language:
    type: string
    required: false
    description: Optional source language.
outputs:
  translation:
    type: string
    required: true
    description: Translated text.
properties:
  deterministic: false
  side_effects: false
  idempotent: true


metadata:
  status: experimental
  tags: [text, nlp, translation]
  examples:
    - summary: "Translate text to another language"
      inputs:
        text: "Hello world"
        target_language: "es"
      outputs:
        text: "Hola mundo"