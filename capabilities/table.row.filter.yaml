id: table.row.filter
version: 1.0.0
description: Filter rows in tabular data according to a condition.
inputs:
  table:
    type: array
    required: true
    description: Input table rows.
  condition:
    type: object
    required: true
    description: Filtering condition.
outputs:
  table:
    type: array
    required: true
    description: Filtered table rows.
properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: experimental
  tags: [table, data, filtering]
  examples:
    - summary: "Filter table rows by condition"
      inputs:
        table: [{name: "Alice", age: 25}, {name: "Bob", age: 30}]
        condition: {age: {$gt: 26}}
      outputs:
        table: [{name: "Bob", age: 30}]