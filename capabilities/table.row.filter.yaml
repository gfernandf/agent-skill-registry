id: table.row.filter
version: 1.0.0
description: Filter rows in tabular data according to a condition.
inputs:
  table:
    type: array
    required: true
    description: Input table rows.
  condition:
    type: object
    required: true
    description: Filtering condition.
outputs:
  table:
    type: array
    required: true
    description: Filtered table rows.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
