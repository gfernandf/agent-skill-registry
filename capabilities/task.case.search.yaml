id: task.case.search
version: 1.0.0
description: Search cases by keyword or criteria.

inputs:
  query:
    type: string
    required: true
    description: Search query string.
  filters:
    type: object
    required: false
    description: Additional filters (status, priority, date_range).

outputs:
  results:
    type: array
    required: true
    description: Matching case objects.
  total:
    type: number
    required: true
    description: Total matching cases.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: experimental
  tags: [task, case, search]


  examples:
    - summary: "Search cases by keyword"
      inputs:
        query: "login"
      outputs:
        results: [{id: "CASE-1", title: "Bug in login page"}]
        total: 1

cognitive_hints:
  role: perceive
  produces:
    results:
      type: Entity
    total:
      type: Entity
  consumes:
  - Entity
