id: reasoning.constraint.reconcile
version: 1.0.0
description: Reconcile conflicting constraints and produce a coherent constraint set
  with trade-offs.
inputs:
  constraints:
    type: array
    required: true
    description: 'Constraint set to reconcile. Schema: array of items with a stable
      item structure expected by downstream consumers.'
  policy:
    type: object
    required: false
    description: 'Optional prioritization policy. Schema: object with stable keys
      expected by downstream consumers; additional keys are optional unless otherwise
      specified.'
outputs:
  reconciled_constraints:
    type: array
    required: true
    description: 'Conflict-resolved constraints with precedence. Schema: array of
      items with a stable item structure expected by downstream consumers.'
  tradeoffs:
    type: array
    required: false
    description: 'Trade-offs introduced by reconciliation. Schema: array of items
      with a stable item structure expected by downstream consumers.'
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
cognitive_hints:
  role: analyze
  consumes:
  - Criterion
  - Context
  produces:
    reconciled_constraints:
      type: Criterion
    tradeoffs:
      type: Tradeoff
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - constraint
  - reconcile
  - reasoning
  examples:
  - summary: Reconcile speed vs compliance constraints
  layer: cognitive
