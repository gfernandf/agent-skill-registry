id: reasoning.content.translate
version: 1.0.0
description: Translate text between languages while preserving semantic intent and
  core meaning. Produces a target-language artifact for multilingual communication
  and downstream processing.
inputs:
  text:
    type: string
    required: true
    description: Text to translate.
  target_language:
    type: string
    required: true
    description: Target language.
  source_language:
    type: string
    required: false
    description: Optional source language.
outputs:
  translation:
    type: string
    required: true
    description: Translated text.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  status: stable
  tags:
  - text
  - nlp
  - translation
  examples:
  - summary: Translate text to another language
    inputs:
      text: Hello world
      target_language: es
    outputs:
      translation: Hola mundo
  layer: cognitive
cognitive_hints:
  role: act
  produces:
    translation:
      type: Artifact
  consumes:
  - Context
