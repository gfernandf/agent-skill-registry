id: reasoning.plan.synthesize
version: 1.0.0
status: stable
description: "Compile a validated ORCA plan into an executable DAG. Resolves the final\
  \ execution order, identifies steps that can run in parallel, emits state binding\
  \ contracts, and inserts policy gate checkpoints. The compiled DAG is the only artefact\
  \ the executor is allowed to consume \u2014 no improvised execution from raw plan\
  \ objects is permitted.\n"
inputs:
  validated_plan:
    type: object
    required: true
    description: 'Plan object that has passed evaluation.plan.validate (status: passed).
      Typically sourced from evaluation.plan.validate.validated_plan. Schema: object
      with stable keys expected by downstream consumers; additional keys are optional
      unless otherwise specified.'
  runtime_config:
    type: object
    required: false
    description: 'Runtime configuration hints: parallelism_limit (number), timeout_seconds
      (number), fail_fast (boolean). Schema: object with stable keys expected by downstream
      consumers; additional keys are optional unless otherwise specified.'
outputs:
  compiled_plan:
    type: object
    required: true
    description: 'Compiled execution artefact with fields: dag (object with nodes
      and edges), execution_order (array of step ids), parallel_groups (array of arrays
      of step ids), gates (array of gate step ids), state_bindings (object), registry_version
      (string), plan_hash (string).

      '
  step_count:
    type: number
    required: false
    description: Total number of steps in the compiled DAG.
  compiled_plan_json:
    type: string
    required: false
    description: JSON string representation of compiled_plan for systems that require
      text payloads.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - orchestration
  - compilation
  - dag
  - agent-pipeline
  examples:
  - validated_plan:
      bound_steps:
      - id: s1_step1
        ref: web.source.search
        depends_on: []
      - id: s1_step2
        ref: reasoning.content.summarize
        depends_on:
        - s1_step1
    expected_compiled_plan:
      execution_order:
      - s1_step1
      - s1_step2
      parallel_groups:
      - - s1_step1
  layer: cognitive
cognitive_hints:
  role: synthesize
  produces:
    compiled_plan:
      type: Plan
    compiled_plan_json:
      type: Message
    step_count:
      type: Score
  consumes:
  - Plan
  - Context
