id: decision.task.delegate
version: 1.0.0
status: stable
description: 'Delegate a task to another agent or subsystem for execution. The caller
  provides a structured task description and a target agent identifier. Returns acceptance
  status and an optional delegation reference for tracking. Requires elevated trust
  and user confirmation before dispatch.

  '
inputs:
  task:
    type: object
    required: true
    description: "Structured task object with fields: description (string, required),\
      \ priority (string: low|medium|high, optional), payload (object, optional \u2014\
      \ arbitrary data the target agent needs).\n"
  agent:
    type: string
    required: true
    description: 'Identifier of the target agent or subsystem to delegate to. Must
      match an entry in allowed_targets or approved connectors.

      '
  timeout_seconds:
    type: number
    required: false
    description: 'Maximum time to wait for acceptance acknowledgement. Defaults to
      30.

      '
  target_tenant_id:
    type: string
    required: false
    description: Optional target tenant identifier for explicit same_tenant enforcement.
outputs:
  accepted:
    type: boolean
    required: true
    description: Whether the target agent accepted the delegation.
  delegation_id:
    type: string
    required: false
    description: 'Reference identifier for tracking the delegated task. Returned only
      when the target agent supports async tracking.

      '
  reason:
    type: string
    required: false
    description: 'Explanation when delegation is rejected (accepted=false).

      '
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
safety:
  trust_level: elevated
  reversible: false
  requires_confirmation: true
  allowed_targets:
  - approved_connectors
  - same_tenant
properties:
  deterministic: false
  side_effects: true
  idempotent: true
  state_access: write
  audit_level: strict
metadata:
  tags:
  - delegation
  - orchestration
  - agent-control
  examples:
  - task:
      description: Summarize the Q3 financial report
      priority: high
    agent: summarizer
    target_tenant_id: tenant-acme
    expected_accepted: true
  status: stable
  layer: orchestration
cognitive_hints:
  role: decide
  produces:
    accepted:
      type: Decision
    delegation_id:
      type: Decision
    reason:
      type: Evidence
  consumes:
  - Context
