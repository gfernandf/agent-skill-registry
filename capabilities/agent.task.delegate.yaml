id: agent.task.delegate
version: 1.0.0
description: Delegate a task to another agent or subsystem.
inputs:
  task:
    type: object
    required: true
    description: Task to delegate.
  agent:
    type: string
    required: true
    description: Target agent identifier.
outputs:
  accepted:
    type: boolean
    required: true
    description: Whether delegation was accepted.

safety:
  trust_level: elevated
  reversible: false
  requires_confirmation: true
  allowed_targets:
    - approved_connectors

properties:
  deterministic: false
  side_effects: true
  idempotent: true
