id: memory.context.summarize
version: 1.0.0
description: Summarize context state into a compressed representation preserving key
  constraints and decisions.
inputs:
  context:
    type: object
    required: true
    description: Context object to summarize.
  target_length:
    type: number
    required: false
    description: Approximate target summary length.
outputs:
  summary_context:
    type: object
    required: true
    description: Compressed context representation for reuse.
  summary_notes:
    type: string
    required: false
    description: Notes about what information was dropped or preserved.
cognitive_hints:
  role: synthesize
  consumes:
  - Context
  produces:
    summary_context:
      type: Context
    summary_notes:
      type: Summary
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: deprecated
  tags:
  - memory
  - context
  - summarize
  examples:
  - summary: Summarize long-running session context
  layer: cognitive
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
replacement: memory.context.compress
