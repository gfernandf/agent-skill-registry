id: evaluation.output.validate
version: 1.0.0
status: stable
description: 'Evaluate whether a final output satisfies the explicit success and acceptance
  criteria defined for the task. Each criterion is assessed individually and the overall
  evaluation returns a pass/fail verdict with per-criterion scores, a list of unmet
  criteria, and concrete improvement suggestions for failed items.

  '
inputs:
  final_output:
    type: object
    required: true
    description: 'Output artefact to evaluate. May be a report, document, data object,
      or any structured result produced by the execution pipeline. Schema: object
      with stable keys expected by downstream consumers; additional keys are optional
      unless otherwise specified.'
  success_criteria:
    type: array
    required: true
    description: 'Array of measurable success criteria from reasoning.criteria.define.
      Each item is a string describing a condition that must be met.

      '
  evidence:
    type: object
    required: false
    description: 'Optional supporting evidence (sources, trace, intermediate outputs)
      to help evaluate criterion satisfaction. Schema: object with stable keys expected
      by downstream consumers; additional keys are optional unless otherwise specified.'
outputs:
  evaluation:
    type: object
    required: true
    description: 'Evaluation result with: passed (boolean), score (number 0-1), criteria_results
      (array of {criterion, met, score, rationale}), failed_criteria (array of strings),
      improvement_suggestions (array of strings).

      '
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  tags:
  - evaluation
  - criteria-validation
  - output-quality
  - agent-pipeline
  examples:
  - final_output:
      user_response: '# EU Hydrogen Briefing

        Regulation (EU) 2021/...'
    success_criteria:
    - Includes at least one EU regulatory reference
    - All claims are supported by cited sources
    expected_evaluation:
      passed: true
      score: 0.9
  layer: cognitive
cognitive_hints:
  role: evaluate
  produces:
    evaluation:
      type: Artifact
  consumes:
  - Artifact
  - Criterion
  - Evidence
