id: model.risk.score
version: 1.0.0
description: Assess the risk level of a model-generated output across safety dimensions such as toxicity, bias, hallucination likelihood, and prompt injection.

inputs:
  output:
    type: object
    required: true
    description: The model-generated output to assess.

  context:
    type: string
    required: false
    description: Original task context or instruction for grounding the assessment.

  dimensions:
    type: array
    required: false
    description: "Risk dimensions to evaluate. Defaults to ['toxicity', 'bias', 'hallucination', 'prompt_injection']."

outputs:
  risk_score:
    type: number
    required: true
    description: Overall risk score between 0.0 (safe) and 1.0 (high risk).

  dimension_scores:
    type: object
    required: true
    description: Mapping of dimension name to individual risk score (0.0–1.0).

  flags:
    type: array
    required: false
    description: List of specific risk flags triggered, each with dimension and detail.

  safe:
    type: boolean
    required: true
    description: Whether the output is considered safe (risk_score below threshold).

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: draft
  tags: [model, safety, risk, toxicity, bias, injection]
  examples:
    - summary: Assess risk of a model response
      inputs:
        output: {"text": "The quarterly results show strong growth."}
        context: "Financial analysis task"
        dimensions: ["toxicity", "bias", "hallucination"]


cognitive_hints:
  role: evaluate
  produces:
    risk_score:
      type: Score
    dimension_scores:
      type: Score
    flags:
      type: Score
    safe:
      type: Score
  consumes:
  - Context
