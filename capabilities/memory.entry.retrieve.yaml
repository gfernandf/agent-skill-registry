id: memory.entry.retrieve
version: 1.0.0
description: Retrieve content from a memory system using explicit keys or selectors.
  Returns stable retrieval payloads suitable for downstream reasoning, planning, and
  evidence-building steps.
inputs:
  key:
    type: string
    required: true
    description: Memory key.
outputs:
  value:
    type: object
    required: false
    description: 'Retrieved value. Schema: object with stable keys expected by downstream
      consumers; additional keys are optional unless otherwise specified.'
  found:
    type: boolean
    required: true
    description: Whether the key was found.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: basic
metadata:
  status: stable
  tags:
  - memory
  - storage
  - retrieval
  examples:
  - summary: Retrieve a stored memory entry
    inputs:
      key: user_preference
    outputs:
      value: dark_mode
      found: true
  layer: operational
cognitive_hints:
  role: act
  produces:
    value:
      type: Entity
    found:
      type: Entity
  consumes:
  - Entity
