id: code.source.format
version: 1.0.0
description: Format source code.
inputs:
  code:
    type: string
    required: true
    description: Source code.
  language:
    type: string
    required: true
    description: Programming language.
outputs:
  formatted_code:
    type: string
    required: true
    description: Formatted source code.
properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [code, developer-tools, formatting]
  examples:
    - summary: "Format Python code"
      inputs:
        code: "def foo( x,y ):
  return x+y"
        language: "python"
      outputs:
        code: "def foo(x, y):
    return x + y
"

cognitive_hints:
  role: analyze
  produces:
    formatted_code:
      type: Artifact
  consumes:
  - Artifact
