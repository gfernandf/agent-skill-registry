id: reasoning.output.sanitize
version: 1.0.0
description: Sanitize a model-generated output by removing or masking harmful content,
  PII, prompt leakage, and disallowed patterns.
inputs:
  output:
    type: object
    required: true
    description: 'The model-generated output to sanitize. Schema: object with stable
      keys expected by downstream consumers; additional keys are optional unless otherwise
      specified.'
  policy:
    type: object
    required: false
    description: 'Sanitization policy with toggles such as remove_pii, remove_harmful,
      remove_prompt_leakage. Defaults to all enabled. Schema: object with stable keys
      expected by downstream consumers; additional keys are optional unless otherwise
      specified.'
outputs:
  sanitized_output:
    type: object
    required: true
    description: 'The sanitized output with disallowed content removed or masked.
      Schema: object with stable keys expected by downstream consumers; additional
      keys are optional unless otherwise specified.'
  removals:
    type: array
    required: false
    description: 'List of removal actions taken, each with field, pattern, and action.
      Schema: array of items with a stable item structure expected by downstream consumers.'
  clean:
    type: boolean
    required: true
    description: Whether the output required no sanitization (true = already clean).
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  status: deprecated
  tags:
  - model
  - safety
  - sanitize
  - pii
  - content-filter
  examples:
  - summary: Remove PII from model output
    inputs:
      output:
        text: Contact john@example.com for details.
      policy:
        remove_pii: true
        remove_harmful: true
  layer: cognitive
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
cognitive_hints:
  role: act
  produces:
    sanitized_output:
      type: Entity
    removals:
      type: Entity
    clean:
      type: Entity
  consumes:
  - Context
replacement: reasoning.output.normalize
