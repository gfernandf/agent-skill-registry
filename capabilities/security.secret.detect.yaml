id: security.secret.detect
version: 1.0.0
description: Detect secret-like tokens in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to inspect.
outputs:
  contains_secret:
    type: boolean
    required: true
    description: Whether secret-like patterns were detected.
  findings:
    type: array
    required: false
    description: Detected secret findings.
properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags:
    - security
    - secret-detection
    - credential-leak
  examples:
    - text: "My API key is sk-1234567890ABCDEFGHIJ"
      expected_contains_secret: true

cognitive_hints:
  role: act
  produces:
    contains_secret:
      type: Entity
    findings:
      type: Entity
  consumes:
  - Context
