id: security.secret.detect
version: 1.0.0
description: Detect secret-like tokens in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to inspect.
outputs:
  contains_secret:
    type: boolean
    required: true
    description: Whether secret-like patterns were detected.
  findings:
    type: array
    required: false
    description: Detected secret findings.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
