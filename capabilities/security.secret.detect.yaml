id: security.secret.detect
version: 1.0.0
description: Detect secret-like tokens in text content.
inputs:
  text:
    type: string
    required: true
    description: Text to inspect.
outputs:
  contains_secret:
    type: boolean
    required: true
    description: Whether secret-like patterns were detected.
  findings:
    type: array
    required: false
    description: Detected secret findings.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the secret detection.
  rationale:
    type: string
    required: false
    description: Human-readable explanation of the detection result.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: strict
metadata:
  status: stable
  tags:
  - security
  - secret-detection
  - credential-leak
  examples:
  - text: My API key is sk-1234567890ABCDEFGHIJ
    expected_contains_secret: true
    expected_rationale: Secret-like token pattern detected.
  layer: governance
cognitive_hints:
  role: act
  produces:
    contains_secret:
      type: Entity
    findings:
      type: Entity
    evidence:
      type: Evidence
    rationale:
      type: Evidence
  consumes:
  - Context
