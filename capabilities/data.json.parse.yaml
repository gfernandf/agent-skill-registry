id: data.json.parse
version: 1.0.0
description: Parse JSON content into a structured representation.
inputs:
  text:
    type: string
    required: true
    description: JSON text.
outputs:
  data:
    type: object
    required: true
    description: Parsed JSON object.
properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [data, processing, parsing]
  examples:
    - summary: "Parse a JSON string"
      inputs:
        text: "{\"name\": \"John\", \"age\": 30}"
      outputs:
        data: {name: "John", age: 30}

cognitive_hints:
  role: perceive
  produces:
    data:
      type: Entity
  consumes:
  - Entity
