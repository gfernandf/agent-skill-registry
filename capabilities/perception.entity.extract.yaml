id: perception.entity.extract
version: 1.0.0
description: Extract named entities (for example people, organizations, locations)
  from a text block. Not intended for generic keyword extraction or context-grounded
  question answering.
inputs:
  text:
    type: string
    required: true
    description: Input text.
outputs:
  entities:
    type: array
    required: true
    description: 'Extracted entities. Schema: array of items with a stable item structure
      expected by downstream consumers.'
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - text
  - nlp
  - extraction
  examples:
  - summary: Extract named entities from text
    inputs:
      text: John Smith works at Google in Mountain View.
    outputs:
      entities:
      - text: John Smith
        type: PERSON
      - text: Google
        type: ORG
  layer: cognitive
cognitive_hints:
  role: perceive
  produces:
    entities:
      type: Entity
  consumes:
  - Context
