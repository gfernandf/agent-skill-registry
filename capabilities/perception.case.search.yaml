id: perception.case.search
version: 1.0.0
description: Search cases by keyword or structured criteria across indexed case attributes.
  Returns discoverable candidates suitable for ranking, diagnosis, and escalation
  pipelines.
inputs:
  query:
    type: string
    required: true
    description: Search query string.
  filters:
    type: object
    required: false
    description: 'Additional filters (status, priority, date_range). Schema: object
      with stable keys expected by downstream consumers; additional keys are optional
      unless otherwise specified.'
outputs:
  results:
    type: array
    required: true
    description: 'Matching case objects. Schema: array of items with a stable item
      structure expected by downstream consumers.'
  total:
    type: number
    required: true
    description: Total matching cases.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - task
  - case
  - search
  examples:
  - summary: Search cases by keyword
    inputs:
      query: login
    outputs:
      results:
      - id: CASE-1
        title: Bug in login page
      total: 1
  layer: operational
cognitive_hints:
  role: perceive
  produces:
    results:
      type: Entity
    total:
      type: Entity
  consumes:
  - Entity
