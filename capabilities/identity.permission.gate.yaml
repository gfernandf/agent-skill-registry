id: identity.permission.gate
version: 1.0.0
description: Gate an action by checking whether a principal holds the required permission.
inputs:
  principal_id:
    type: string
    required: true
    description: Identifier of the principal requesting access.
  permission:
    type: string
    required: true
    description: Permission string to check (e.g. resource:action).
  context:
    type: object
    required: false
    description: Additional context such as resource metadata or environment.
outputs:
  allowed:
    type: boolean
    required: true
    description: Whether the action is allowed.
  decision:
    type: string
    required: false
    description: Canonical decision outcome (allow, deny, conditional_allow, escalate).
  reason:
    type: string
    required: true
    description: Explanation for the gate decision.
  rationale:
    type: string
    required: false
    description: Human-readable rationale for the gate decision.
  evidence:
    type: object
    required: false
    description: Structured evidence supporting the gate decision.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: strict
metadata:
  status: stable
  tags:
  - identity
  - permission
  - gate
  - access-control
  examples:
  - summary: Check whether a principal is allowed an action
    inputs:
      principal_id: alice
      permission: resource:read
    outputs:
      allowed: true
      decision: allow
      reason: Permission granted via admin role.
  layer: governance
cognitive_hints:
  role: evaluate
  produces:
    allowed:
      type: Decision
    decision:
      type: Decision
    reason:
      type: Evidence
    rationale:
      type: Evidence
    evidence:
      type: Evidence
  consumes:
  - Entity
