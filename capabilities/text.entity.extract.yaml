id: text.entity.extract
version: 1.0.0
description: Extract named entities from a text block.
inputs:
  text:
    type: string
    required: true
    description: Input text.
outputs:
  entities:
    type: array
    required: true
    description: Extracted entities.
properties:
  deterministic: false
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [text, nlp, extraction]
  examples:
    - summary: "Extract named entities from text"
      inputs:
        text: "John Smith works at Google in Mountain View."
      outputs:
        entities: [{text: "John Smith", type: "PERSON"}, {text: "Google", type: "ORG"}]

cognitive_hints:
  role: perceive
  produces:
    entities:
      type: Entity
  consumes:
  - Context
