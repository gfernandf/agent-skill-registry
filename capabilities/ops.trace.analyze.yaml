id: ops.trace.analyze
version: 1.0.0
description: >
  Analyze incremental execution traces as a cognitive interpretation unit.
  This capability reconstructs the agent's reasoning path from runtime events,
  infers assumptions, identifies plausible alternatives, estimates confidence,
  and returns structured views such as decision graphs. It is intended to be
  called repeatedly during execution (update mode) and once at run closure
  (finalize mode), without coupling to any specific model provider.

inputs:
  goal:
    type: string
    required: true
    description: Declared goal of the agent run being traced.
  context:
    type: object
    required: false
    description: Optional contextual constraints or environment metadata for analysis.
  events:
    type: array
    required: true
    description: Ordered batch of runtime events for this analysis cycle.
  trace_state:
    type: object
    required: false
    description: Inline accumulated trace state from previous cycles.
  trace_session_id:
    type: string
    required: false
    description: Reference identifier for server-managed trace state.
  state_mode:
    type: string
    required: false
    description: State continuity mode. Supported values are auto, inline, and reference.
  mode:
    type: string
    required: false
    description: Analysis mode. Supported values are update and finalize.
  output_views:
    type: array
    required: false
    description: Optional list of requested views such as decision_graph, assumptions, and summary.

  thresholds:
    type: object
    required: false
    description: Optional thresholds for risk and alert evaluation during trace analysis. Supported keys include max_duration_ms and max_errors.

outputs:
  trace_session_id:
    type: string
    required: true
    description: Stable trace session id to continue analysis across calls.
  updated_trace_state:
    type: object
    required: true
    description: Updated accumulated trace state for subsequent cycles.
  state_checksum:
    type: string
    required: false
    description: Hash/checksum of the updated state for auditability and drift checks.
  trace_version:
    type: string
    required: false
    description: Version tag of the trace state schema used in this response.
  decision_graph:
    type: object
    required: false
    description: Structured graph representation of detected decisions and dependencies.
  assumptions:
    type: array
    required: false
    description: Detected assumptions inferred from the analyzed execution path.
  alternative_paths:
    type: array
    required: false
    description: Alternative viable paths inferred from current evidence and goal.
  confidence:
    type: number
    required: false
    description: Confidence score for this analysis cycle in the range 0 to 1.
  risk_candidates:
    type: array
    required: false
    description: Candidate risk findings before thresholding/monitoring.
  summary:
    type: string
    required: false
    description: Human-readable summary of the current trace analysis.

cognitive_hints:
  role: reflect
  consumes:
    - Context
    - Evidence
  produces:
    updated_trace_state:
      type: Context
    decision_graph:
      type: Artifact
    assumptions:
      type: Evidence
    alternative_paths:
      type: Hypothesis
    confidence:
      type: Score
    risk_candidates:
      type: Risk
    summary:
      type: Summary

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: experimental
  tags:
    - trace
    - observability
    - reasoning
    - cognitive-unit
  use_cases:
    - Live analysis of an ongoing agent run to keep an auditable reasoning state.
    - Final synthesis of a completed run into assumptions, alternatives, and summary.
    - Explainability export for third-party review and governance workflows.
  examples:
    - input:
        goal: "Assess market expansion feasibility"
        state_mode: "inline"
        mode: "update"
        events:
          - type: "step_completed"
            timestamp: "2026-03-15T10:00:00Z"
            step_id: "search_market_data"
      output:
        confidence: 0.71
        assumptions:
          - "Primary source is representative for target market"
        risk_candidates:
          - "decision_without_evidence"

