id: memory.entry.store
version: 1.0.0
description: 'Legacy memory write alias. Prefer memory.record.store for canonical
  structured memory writes.

  '
inputs:
  key:
    type: string
    required: true
    description: Memory key.
  value:
    type: object
    required: true
    description: Value to store.
outputs:
  stored:
    type: boolean
    required: true
    description: Whether storage succeeded.
safety:
  trust_level: standard
  data_classification: internal
  reversible: true
properties:
  deterministic: true
  side_effects: true
  idempotent: true
  state_access: write
  audit_level: strict
metadata:
  status: deprecated
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-01'
  tags:
  - memory
  - storage
  - persistence
  - legacy
  examples:
  - summary: Store a key-value memory entry
    inputs:
      key: user_preference
      value: dark_mode
    outputs:
      stored: true
  layer: operational
cognitive_hints:
  role: act
  produces:
    stored:
      type: Entity
  consumes:
  - Entity
replacement: memory.record.store
