id: memory.entry.store
version: 1.0.0
description: Store content in a memory system.
inputs:
  key:
    type: string
    required: true
    description: Memory key.
  value:
    type: object
    required: true
    description: Value to store.
outputs:
  stored:
    type: boolean
    required: true
    description: Whether storage succeeded.

safety:
  trust_level: standard
  data_classification: internal
  reversible: true

properties:
  deterministic: true
  side_effects: true
  idempotent: true
