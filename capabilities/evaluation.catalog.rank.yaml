id: evaluation.catalog.rank
version: 1.0.0
status: stable
description: 'Rank a set of candidate registry items by relevance to the interpreted
  goal, considering composability, trust level (stable > experimental > draft), side
  effects, and expected utility. Returns separate ordered lists of skills and capabilities
  for the planner to consume.

  '
inputs:
  candidate_items:
    type: array
    required: true
    description: 'Array of candidate registry items produced by perception.catalog.search.

      '
  interpreted_goal:
    type: object
    required: true
    description: 'Interpreted goal object for relevance context. Schema: object with
      stable keys expected by downstream consumers; additional keys are optional unless
      otherwise specified.'
outputs:
  ranked_skills:
    type: array
    required: true
    description: 'Ordered list of skill candidates, each with rank, ref, score, and
      rationale. Schema: array of items with a stable item structure expected by downstream
      consumers.'
  ranked_capabilities:
    type: array
    required: true
    description: 'Ordered list of capability candidates, each with rank, ref, score,
      and rationale. Schema: array of items with a stable item structure expected
      by downstream consumers.'
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - registry
  - catalog
  - ranking
  - agent-pipeline
  examples:
  - candidate_items:
    - ref: research.generate-briefing
      type: skill
      relevance_score: 0.92
    - ref: reasoning.content.summarize
      type: capability
      relevance_score: 0.78
    expected_ranked_skills:
    - rank: 1
      ref: research.generate-briefing
  layer: cognitive
  status: deprecated
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
cognitive_hints:
  role: evaluate
  produces:
    ranked_skills:
      type: Option
    ranked_capabilities:
      type: Option
  consumes:
  - Option
  - Artifact
replacement: evaluation.framework.rank
