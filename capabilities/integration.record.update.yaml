id: integration.record.update
version: 1.0.0
description: Update an existing record in an external system via a connector.

inputs:
  connector_id:
    type: string
    required: true
    description: Identifier of the target connector.
  record_id:
    type: string
    required: true
    description: Identifier of the record to update.
  fields:
    type: object
    required: true
    description: Fields to update with their new values.

outputs:
  updated:
    type: boolean
    required: true
    description: Whether the record was updated.

properties:
  deterministic: false
  side_effects: true
  idempotent: true

safety:
  trust_level: standard
  requires_confirmation: false
  description: Updates a record in a mock in-memory store.

metadata:
  status: stable
  tags: [integration, record, update]


  examples:
    - summary: "Update a record in an external system"
      inputs:
        connector_id: "crm-rest"
        record_id: "rec-001"
        fields: {email: "new@example.com"}
      outputs:
        updated: true

cognitive_hints:
  role: act
  produces:
    updated:
      type: Entity
  consumes:
  - Entity
