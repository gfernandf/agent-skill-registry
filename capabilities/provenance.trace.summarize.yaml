id: provenance.trace.summarize
version: 1.0.0
description: Summarize an execution trace into a compact audit-focused report for downstream review and observability.
inputs:
  execution_trace:
    type: object
    required: true
    description: Raw execution result or trace object with step results, decisions, and status.
outputs:
  trace_summary:
    type: object
    required: true
    description: Summary object containing steps executed, decisions made, failures, and overall outcome.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
  evidence:
    type: object
    required: false
    description: Structured evidence used to produce the trace summary.
  rationale:
    type: string
    required: false
    description: Human-readable explanation of the trace summary.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  status: draft
  tags:
  - provenance
  - trace
  - audit
  - reporting
  examples:
  - summary: Summarize a governed execution trace
    inputs:
      execution_trace:
        status: success
        step_results:
        - step_id: s1_step1
          status: success
          duration_ms: 340
    outputs:
      status: ok
      trace_summary:
        overall_status: success
      rationale: Trace summarized from successful step results.
  layer: governance
cognitive_hints:
  role: synthesize
  produces:
    trace_summary:
      type: Summary
    evidence:
      type: Evidence
    rationale:
      type: Evidence
  consumes:
  - Artifact
