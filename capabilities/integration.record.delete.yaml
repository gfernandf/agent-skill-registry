id: integration.record.delete
version: 1.0.0
description: Delete a record in an external system via a connector.

inputs:
  connector_id:
    type: string
    required: true
    description: Identifier of the target connector.
  record_id:
    type: string
    required: true
    description: Identifier of the record to delete.

outputs:
  deleted:
    type: boolean
    required: true
    description: Whether the record was deleted.

properties:
  deterministic: true
  side_effects: true
  idempotent: true

safety:
  trust_level: elevated
  requires_confirmation: true
  description: Deletes a record. Destructive operation.

metadata:
  status: experimental
  tags: [integration, record, delete]


  examples:
    - summary: "Delete a record in an external system"
      inputs:
        connector_id: "crm-rest"
        record_id: "rec-001"
      outputs:
        deleted: true