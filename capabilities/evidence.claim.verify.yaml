id: evidence.claim.verify
version: 1.0.0
description: Verify whether a claim is supported by provided sources. Produces a reproducible
  verification judgment and supporting rationale to enable reliable downstream decision,
  audit, and response generation flows.
inputs:
  claim:
    type: string
    required: true
    description: Claim text to verify.
  sources:
    type: array
    required: true
    description: 'Candidate evidence sources. Schema: array of items with a stable
      item structure expected by downstream consumers.'
outputs:
  verified:
    type: boolean
    required: true
    description: Whether the claim is verified.
  evidence:
    type: array
    required: false
    description: 'Supporting evidence snippets. Schema: array of items with a stable
      item structure expected by downstream consumers.'
  rationale:
    type: string
    required: false
    description: Explanation for verification result.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - provenance
  - citation
  - verification
  examples:
  - summary: Verify a claim against sources
    inputs:
      claim: Revenue grew 15%
      sources:
      - text: Revenue grew 15% in Q3.
    outputs:
      verified: true
      evidence:
      - Revenue grew 15% in Q3.
      rationale: The claim is directly supported by the provided source snippet.
  layer: cognitive
cognitive_hints:
  role: evaluate
  produces:
    verified:
      type: Score
    evidence:
      type: Evidence
    rationale:
      type: Evidence
  consumes:
  - Context
