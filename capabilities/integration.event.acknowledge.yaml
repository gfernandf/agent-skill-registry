id: integration.event.acknowledge
version: 1.0.0
description: Acknowledge receipt of an integration event from an external system.

inputs:
  event_id:
    type: string
    required: true
    description: Unique identifier of the event.
  connector_id:
    type: string
    required: false
    description: Connector the event originated from.
  notes:
    type: string
    required: false
    description: Optional acknowledgement notes.

outputs:
  acknowledged:
    type: boolean
    required: true
    description: Whether the event was acknowledged.
  timestamp:
    type: string
    required: true
    description: ISO-8601 timestamp of the acknowledgement.

properties:
  deterministic: true
  side_effects: true
  idempotent: true

safety:
  trust_level: standard
  requires_confirmation: false
  description: Acknowledges an event. Baseline is local-only.

metadata:
  status: stable
  tags: [integration, event, acknowledgement]


  examples:
    - summary: "Acknowledge an integration event"
      inputs:
        event_id: "evt-001"
        handler: "sync-worker"
      outputs:
        acknowledged: true

cognitive_hints:
  role: act
  produces:
    acknowledged:
      type: Decision
    timestamp:
      type: Entity
  consumes:
  - Entity
