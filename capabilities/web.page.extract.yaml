id: web.page.extract
version: 1.0.0
description: Extract main textual content from a web page.
inputs:
  content:
    type: string
    required: true
    description: Raw page content.
outputs:
  text:
    type: string
    required: true
    description: Extracted main text.

cognitive_hints:
  role: perceive
  produces:
    text:
      type: Artifact

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [web, extraction, html, text]
  examples:
    - description: Extract text from an HTML page
      inputs:
        content: "<html><body><h1>Title</h1><p>Main content.</p></body></html>"
      outputs:
        text: "Title\nMain content."
