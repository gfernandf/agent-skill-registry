id: integration.record.create
version: 1.0.0
description: Create a new record in an external system via a connector.

inputs:
  connector_id:
    type: string
    required: true
    description: Identifier of the target connector.
  record:
    type: object
    required: true
    description: Record data to create.

outputs:
  created:
    type: boolean
    required: true
    description: Whether the record was created.
  record_id:
    type: string
    required: true
    description: Identifier of the created record.

properties:
  deterministic: false
  side_effects: true
  idempotent: false

safety:
  trust_level: standard
  requires_confirmation: false
  description: Creates a record in a mock in-memory store.

metadata:
  status: experimental
  tags: [integration, record, create]


  examples:
    - summary: "Create a record in an external system"
      inputs:
        connector_id: "crm-rest"
        record: {name: "New Contact"}
      outputs:
        record_id: "rec-001"
        created: true

cognitive_hints:
  role: act
  produces:
    created:
      type: Entity
    record_id:
      type: Entity
  consumes:
  - Entity
