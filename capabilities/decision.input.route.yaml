id: decision.input.route
version: 1.0.0
status: stable
description: 'Route an incoming request to the most appropriate handler, agent, or
  capability based on the input content and available targets. Returns the selected
  route identifier and an optional confidence score.

  '
inputs:
  query:
    type: string
    required: true
    description: 'The incoming request text or question to be routed.

      '
  agents:
    type: array
    required: false
    description: 'List of available agent or handler identifiers. When provided, the
      router restricts its selection to this set. Schema: array of items with a stable
      item structure expected by downstream consumers.'
  routing_strategy:
    type: string
    required: false
    description: 'Routing strategy hint: "keyword", "semantic", or "round-robin".
      Defaults to "keyword".

      '
outputs:
  route:
    type: string
    required: true
    description: Selected handler or agent identifier.
  confidence:
    type: number
    required: false
    description: "Confidence score (0.0\u20131.0) for the selected route. Omitted\
      \ when the baseline deterministic router is used.\n"
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  tags:
  - routing
  - orchestration
  - agent-control
  examples:
  - query: Summarize this quarterly earnings report
    agents:
    - summarizer
    - analyst
    - translator
    expected_route: summarizer
  status: stable
  layer: cognitive
cognitive_hints:
  role: decide
  produces:
    route:
      type: Decision
    confidence:
      type: Score
  consumes:
  - Context
