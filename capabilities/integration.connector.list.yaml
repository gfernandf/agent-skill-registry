id: integration.connector.list
version: 1.0.0
description: List available connectors, optionally filtered by type or status.

inputs:
  type_filter:
    type: string
    required: false
    description: Filter connectors by type (e.g. rest, database, queue).
  status_filter:
    type: string
    required: false
    description: Filter by status (e.g. active, inactive).

outputs:
  connectors:
    type: array
    required: true
    description: List of connector metadata objects.
  total:
    type: number
    required: true
    description: Total connectors returned.

properties:
  deterministic: true
  side_effects: false
  idempotent: true

metadata:
  status: stable
  tags: [integration, connector, listing]


  examples:
    - summary: "List available connectors"
      inputs:
        status_filter: "active"
      outputs:
        connectors: [{id: "crm-rest", status: "active"}]
        total: 1

cognitive_hints:
  role: perceive
  produces:
    connectors:
      type: Entity
    total:
      type: Entity
  consumes:
  - Entity
