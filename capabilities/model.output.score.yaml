id: model.output.score
version: 1.0.0
description: Score a model-generated output on multiple quality dimensions such as relevance, fluency, completeness, and faithfulness.

inputs:
  output:
    type: object
    required: true
    description: The model-generated output to score.

  instruction:
    type: string
    required: true
    description: The original instruction that produced the output.

  reference:
    type: object
    required: false
    description: Optional reference or ground truth to compare against.

  dimensions:
    type: array
    required: false
    description: "Quality dimensions to evaluate. Defaults to ['relevance', 'fluency', 'completeness', 'faithfulness']."

outputs:
  scores:
    type: object
    required: true
    description: "Mapping of dimension name to score (0.0–1.0)."

  overall:
    type: number
    required: true
    description: Weighted overall quality score between 0.0 and 1.0.

  rationale:
    type: string
    required: false
    description: Human-readable summary of the scoring rationale.

properties:
  deterministic: false
  side_effects: false
  idempotent: true

metadata:
  status: draft
  tags: [model, quality, scoring, evaluation]
  examples:
    - summary: Score a generated summary on quality dimensions
      inputs:
        output: {"summary": "Cloud revenue drove 15% growth."}
        instruction: "Summarize the quarterly financial results"
        dimensions: ["relevance", "fluency", "completeness"]


cognitive_hints:
  role: evaluate
  produces:
    scores:
      type: Score
    overall:
      type: Score
    rationale:
      type: Evidence
  consumes:
  - Context
