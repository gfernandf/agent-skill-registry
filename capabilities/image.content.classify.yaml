id: image.content.classify
version: 1.0.0
description: Classify an image into one or more categories.
inputs:
  image:
    type: string
    required: true
    description: Image input or path.
  labels:
    type: array
    required: false
    description: Optional candidate labels.
outputs:
  label:
    type: string
    required: true
    description: Predicted image label.
  confidence:
    type: number
    required: false
    description: Optional confidence score.
properties:
  deterministic: false
  side_effects: false
  idempotent: true


metadata:
  status: experimental
  tags: [image, vision, classification]
  examples:
    - summary: "Classify image content by labels"
      inputs:
        image: "(binary image data)"
        labels: ["cat", "dog", "bird"]
      outputs:
        label: "cat"
        confidence: 0.92

cognitive_hints:
  role: analyze
  produces:
    label:
      type: Artifact
    confidence:
      type: Score
  consumes:
  - Artifact
