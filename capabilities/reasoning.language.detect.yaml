id: reasoning.language.detect
version: 1.0.0
description: Detect the language of text for routing, localization, and policy-aware
  processing decisions. Provides a language signal usable across downstream capabilities.
inputs:
  text:
    type: string
    required: true
    description: Text to analyze.
outputs:
  language:
    type: string
    required: true
    description: Detected language.
  confidence:
    type: number
    required: false
    description: Optional confidence score.
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: deprecated
  tags:
  - text
  - nlp
  - detection
  examples:
  - summary: Detect the language of a text
    inputs:
      text: Bonjour le monde
    outputs:
      language: fr
      confidence: 0.98
  layer: cognitive
  deprecation_date: '2026-05-25'
  sunset_date: '2026-09-30'
cognitive_hints:
  role: act
  produces:
    language:
      type: Artifact
    confidence:
      type: Score
  consumes:
  - Context
replacement: perception.language.detect
