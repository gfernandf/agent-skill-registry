id: evidence.source.assess
version: 1.0.0
description: Assess source credibility, relevance, and recency for evidence quality.
  Produces consistent source-quality judgments that can be reused by verification,
  ranking, and justification capabilities across domains.
inputs:
  sources:
    type: array
    required: true
    description: 'Sources to assess. Schema: array of items with a stable item structure
      expected by downstream consumers.'
  criteria:
    type: array
    required: false
    description: 'Optional assessment criteria and weights. Schema: array of items
      with a stable item structure expected by downstream consumers.'
outputs:
  source_scores:
    type: array
    required: true
    description: 'Scores per source with credibility, relevance, and recency dimensions.
      Schema: array of items with a stable item structure expected by downstream consumers.'
  assessment_summary:
    type: string
    required: false
    description: Overall source quality summary.
cognitive_hints:
  role: evaluate
  consumes:
  - Evidence
  - Criterion
  produces:
    source_scores:
      type: Score
    assessment_summary:
      type: Summary
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - evidence
  - source
  - assessment
  examples:
  - summary: Assess reliability of three market reports
  layer: cognitive
