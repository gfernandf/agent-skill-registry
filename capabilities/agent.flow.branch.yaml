id: agent.flow.branch
version: 1.0.0
description: >
  Evaluate a condition against the current context and select which
  execution branch to follow. Accepts a condition expression (natural
  language or structured predicate) and a set of named branches. Returns
  the selected branch identifier and a rationale explaining the choice.
  This is the primary control-flow primitive for conditional workflows.

inputs:
  condition:
    type: string
    required: true
    description: >
      The condition to evaluate — may be a natural-language predicate
      ("the risk score is above 0.7") or a structured expression
      ("risk_score > 0.7").

  context:
    type: object
    required: true
    description: >
      The execution context containing variables and prior step outputs
      against which the condition is evaluated.

  branches:
    type: array
    required: true
    description: >
      Available branches, each an object with fields: id (string slug),
      label (human-readable name), and optional match_expression
      (structured predicate that refines the condition for this branch).

  default_branch:
    type: string
    required: false
    description: >
      Branch id to select when no branch explicitly matches. If omitted
      and no match is found, the first branch is selected.

outputs:
  selected_branch:
    type: string
    required: true
    description: The id of the selected branch.

  rationale:
    type: string
    required: true
    description: Explanation of why this branch was selected.

  confidence:
    type: number
    required: false
    description: Confidence score for the branch selection (0.0–1.0).

properties:
  deterministic: false
  side_effects: false
  idempotent: true

cognitive_hints:
  role: decide
  consumes:
    - Context
  produces:
    selected_branch:
      type: Decision
    rationale:
      type: Evidence

metadata:
  status: stable
  tags: [control-flow, branching, conditional, orchestration]

  examples:
    - summary: "Route workflow based on risk score"
      inputs:
        condition: "risk_score > 0.7"
        context:
          risk_score: 0.85
          category: "financial"
        branches:
          - id: high_risk
            label: "High risk path"
            match_expression: "risk_score > 0.7"
          - id: normal
            label: "Normal path"
        default_branch: normal
      outputs:
        selected_branch: high_risk
        rationale: "risk_score is 0.85, which exceeds the 0.7 threshold"
        confidence: 0.95
