version: 0.1

capabilities:

  - id: text.template
    status: draft
    description: Render a text template using provided variables.

  - id: text.summarize
    status: draft
    description: Produce a condensed version of a text preserving key points.

  - id: fs.read
    status: draft
    description: Read content from a filesystem path.

  - id: pdf.read
    status: draft
    description: Read a PDF document and extract text and metadata.

  - id: research.source.retrieve
    status: experimental
    description: Resolve source_ref fields in corpus items to actual text content.

  - id: agent.option.generate
    status: experimental
    description: Generate a set of plausible, distinct options for a decision problem.

  - id: eval.option.score
    status: experimental
    description: Evaluate options against weighted criteria with comparative scoring and trade-offs.

  - id: eval.option.analyze
    status: experimental
    description: Qualitative analysis of options — pros, cons, risks, and assumptions per option.

  - id: decision.option.justify
    status: experimental
    description: Select a final recommendation from evaluated options with structured justification.

  - id: analysis.split
    status: experimental
    description: Split a complex problem into manageable, described components with dependencies and order.

  - id: analysis.risk.extract
    status: experimental
    description: Extract risks, fragile assumptions, failure modes, and mitigation ideas from a target artifact.