version: 0.1

capabilities:

  - id: agent.task.delegate
    status: experimental
    description: Delegate a task to another agent or subsystem for execution with elevated trust and confirmation.

  - id: agent.option.generate
    status: experimental
    description: Generate a set of plausible, distinct options for a given situation or decision problem. Accepts a goal description and optional contextual constraints. Returns 2-5 structured options, each with a label, description, and key attributes. Designed to avoid combinatorial explosion and hallucinated options by grounding generation in the provided context.


  - id: agent.plan.create
    status: experimental
    description: Generates a valid skill YAML definition from a natural language intent description. Uses the local capability catalog as context so the generated skill only references capabilities that are registered and available.


  - id: agent.plan.generate
    status: experimental
    description: Generate a structured execution plan with ordered steps, assumptions, and risk notes for a given objective.

  - id: agent.input.route
    status: experimental
    description: Route an incoming request to the most appropriate handler or agent based on content and available targets.

  - id: analysis.risk.extract
    status: experimental
    description: Extract risks, fragile assumptions, failure modes, and preliminary mitigation ideas from a target artifact (decision, plan, analysis, proposal, draft). Produces a structured risk inventory with severity hints. Does NOT score or rank risks — that is the responsibility of downstream capabilities.


  - id: analysis.problem.split
    status: experimental
    description: Split a complex problem, topic, or domain into a set of manageable, described components with a suggested analysis order. The decomposition strategy (by themes, dimensions, phases, questions, stakeholders, risks) is provided as input. Returns components with descriptions, dependencies between them, and flags for gaps or overlaps.


  - id: analysis.theme.cluster
    status: experimental
    description: Group a collection of text items into coherent thematic clusters. Identifies dominant themes, assigns each item to one or more clusters, and produces a summary per cluster with signal strength. Accepts optional hint labels to guide (not force) the thematic structure.


  - id: audio.speech.synthesize
    status: experimental
    description: Convert text into speech audio (text-to-speech).

  - id: audio.speech.transcribe
    status: draft
    description: Convert speech audio to text.

  - id: code.diff.extract
    status: draft
    description: Extract differences between two code versions.

  - id: code.snippet.execute
    status: draft
    description: Execute a code snippet.

  - id: code.source.analyze
    status: experimental
    description: Analyze source code for structural metrics and quality signals.

  - id: code.source.format
    status: draft
    description: Format source code.

  - id: data.json.parse
    status: draft
    description: Parse JSON content into a structured representation.

  - id: data.record.transform
    status: experimental
    description: Transform records by applying field mappings, renames, type coercions, and computed fields.

  - id: data.record.deduplicate
    status: draft
    description: Deduplicate structured records using key fields.

  - id: data.schema.validate
    status: draft
    description: Validate structured data against a schema.

  - id: decision.option.justify
    status: experimental
    description: Select a final recommendation from evaluated options and produce a structured justification. Consumes qualitative analysis (from eval.option.analyze) and quantitative scores (from eval.option.score) to make an explicit, committed choice. Outputs the recommendation, justification narrative, failure modes, uncertainties, confidence assessment, and concrete next steps.
This capability is the \"closing\" step — it resolves ambiguity into action. It must never hedge with \"it depends\" or \"consider both\".


  - id: doc.content.chunk
    status: draft
    description: Split a document or text into chunks.

  - id: email.inbox.read
    status: draft
    description: Read email messages from a mailbox.

  - id: email.message.send
    status: draft
    description: Send an email message.

  - id: eval.option.analyze
    status: experimental
    description: Perform qualitative analysis of each option in a decision set. For every option, identify pros, cons, risks, and underlying assumptions. Does NOT assign numeric scores — that is the responsibility of eval.option.score. This capability produces the structured qualitative evidence that scoring and justification steps consume downstream.


  - id: eval.option.score
    status: experimental
    description: Evaluate a set of options against weighted criteria and produce a comparative scoring. Each option is scored per-criterion and overall. Returns the ranked list, a comparative summary, and explicit trade-offs between top candidates. Designed for multi-criteria decision analysis where transparency of evaluation matters more than speed.


  - id: eval.output.score
    status: experimental
    description: Score the quality of an output artifact against an optional rubric with per-dimension details and quality-level labels.

  - id: fs.file.list
    status: experimental
    description: List files and directories under a given path.

  - id: fs.file.read
    status: draft
    description: Read content from a filesystem path.

  - id: fs.file.write
    status: experimental
    description: Write content to a file inside the sandbox root.

  - id: identity.assignee.identify
    status: draft
    description: Identify the most appropriate assignee for a task based on skills, availability, and workload.

  - id: identity.decision.justify
    status: draft
    description: Justify an identity or access-related decision by referencing policies and evidence.

  - id: identity.permission.gate
    status: draft
    description: Gate an action by checking whether a principal holds the required permission.

  - id: identity.permission.get
    status: draft
    description: Retrieve a specific permission definition by identifier.

  - id: identity.permission.list
    status: draft
    description: List permissions granted to a principal, optionally filtered by resource.

  - id: identity.permission.verify
    status: draft
    description: Verify that a principal holds a specific permission and return evidence.

  - id: identity.risk.score
    status: draft
    description: Score the identity risk of a principal based on behaviour, role scope, and anomaly indicators.

  - id: identity.role.assign
    status: draft
    description: Assign a role to a principal.

  - id: identity.role.get
    status: draft
    description: Retrieve a role definition by identifier.

  - id: identity.role.list
    status: draft
    description: List all available roles, optionally filtered by scope or tag.

  - id: image.caption.generate
    status: draft
    description: Generate a caption for an image.

  - id: image.content.classify
    status: draft
    description: Classify an image into one or more categories.

  - id: image.content.extract
    status: experimental
    description: Extract text content from an image using OCR.

  - id: integration.connector.get
    status: draft
    description: Retrieve metadata for a specific connector by identifier.

  - id: integration.connector.list
    status: draft
    description: List available connectors, optionally filtered by type or status.

  - id: integration.connector.sync
    status: draft
    description: Trigger a synchronisation operation on a connector.

  - id: integration.event.acknowledge
    status: draft
    description: Acknowledge receipt of an integration event from an external system.

  - id: integration.mapping.transform
    status: draft
    description: Apply a field mapping to transform a source record into a target schema.

  - id: integration.mapping.validate
    status: draft
    description: Validate a field mapping definition for completeness and consistency.

  - id: integration.record.compare
    status: draft
    description: Compare records from two systems and report differences.

  - id: integration.record.create
    status: draft
    description: Create a new record in an external system via a connector.

  - id: integration.record.delete
    status: draft
    description: Delete a record in an external system via a connector.

  - id: integration.record.reconcile
    status: draft
    description: Reconcile records between two systems and report discrepancies.

  - id: integration.record.update
    status: draft
    description: Update an existing record in an external system via a connector.

  - id: integration.record.upsert
    status: draft
    description: Create or update a record in an external system, depending on whether it exists.

  - id: memory.record.store
    status: draft
    description: Store a structured record in memory with namespace isolation and optional TTL.

  - id: memory.entry.retrieve
    status: draft
    description: Retrieve content from a memory system.

  - id: memory.entry.store
    status: draft
    description: Store content in a memory system.

  - id: memory.vector.search
    status: draft
    description: Search memory records by vector similarity against a query embedding.

  - id: message.priority.classify
    status: draft
    description: Classify the priority of a message based on content, sender, and context.

  - id: message.notification.send
    status: draft
    description: Send a generic message.

  - id: model.embedding.generate
    status: draft
    description: Generate a vector embedding for a text input using a model-level embedding service.

  - id: model.output.classify
    status: draft
    description: Classify a model-generated output into one of the provided categories.

  - id: model.output.generate
    status: experimental
    description: Generate structured output from a model given an instruction, context items, and an output schema.

  - id: model.output.sanitize
    status: draft
    description: Sanitize a model-generated output by removing harmful content, PII, and prompt leakage.

  - id: model.output.score
    status: draft
    description: Score a model-generated output on quality dimensions such as relevance, fluency, and completeness.

  - id: model.prompt.template
    status: draft
    description: Render a model prompt from a template and variable bindings.

  - id: model.response.validate
    status: experimental
    description: Validate a model-generated output for semantic coherence, evidence grounding, and structural completeness.

  - id: model.risk.score
    status: draft
    description: Assess the risk level of a model-generated output across safety dimensions.

  - id: ops.budget.estimate
    status: draft
    description: Estimate execution budget for a plan.

  - id: ops.event.acknowledge
    status: draft
    description: Acknowledge receipt and handling of an operational event.

  - id: ops.event.monitor
    status: draft
    description: Monitor a stream of operational events and return status with alerts for threshold violations.

  - id: ops.trace.analyze
    status: experimental
    description: Analyze incremental execution traces as a cognitive interpretation unit. This capability reconstructs the agent's reasoning path from runtime events, infers assumptions, identifies plausible alternatives, estimates confidence, and returns structured views such as decision graphs. It is intended to be called repeatedly during execution (update mode) and once at run closure (finalize mode), without coupling to any specific model provider.


  - id: ops.trace.monitor
    status: experimental
    description: Monitor trace state against operational thresholds as a control/governance cognitive unit. This capability does not infer new reasoning structure; instead it evaluates existing trace artifacts and emits deterministic control signals (status, risk flags, alerts, metrics) that can be used to continue, re-plan, or stop an agent workflow.


  - id: pdf.document.read
    status: draft
    description: Read a PDF document and extract textual content.

  - id: policy.constraint.gate
    status: draft
    description: Evaluate a payload against a policy gate and return a pass/block decision with rationale.

  - id: policy.constraint.validate
    status: draft
    description: Validate an output payload against an explicit constraint policy.

  - id: policy.decision.justify
    status: draft
    description: Justify a policy decision by linking it to applicable rules and evidence.

  - id: policy.risk.classify
    status: draft
    description: Classify the risk level of an action or payload according to policy categories.

  - id: policy.risk.score
    status: draft
    description: Compute a numeric risk score for an action across policy dimensions.

  - id: provenance.citation.generate
    status: draft
    description: Generate a structured citation for a source fragment.

  - id: provenance.claim.verify
    status: draft
    description: Verify whether a claim is supported by provided sources.

  - id: research.source.retrieve
    status: draft
    description: Resolve source_ref fields in a list of corpus items to actual text content. Handles pdf_path, fs_path, url, and raw_text source types. Items that already have content are passed through unchanged. The resolved items are suitable for passing to model.output.generate or further analysis steps.


  - id: security.output.gate
    status: stable
    description: Apply policy gates to decide whether an output can be released.

  - id: security.pii.detect
    status: stable
    description: Detect personally identifiable information in text content.

  - id: security.pii.redact
    status: stable
    description: Redact personally identifiable information in text content.

  - id: security.secret.detect
    status: stable
    description: Detect secret-like tokens in text content.

  - id: table.column.aggregate
    status: experimental
    description: Compute aggregate values over table columns (sum, avg, min, max, count) with optional grouping.

  - id: table.row.filter
    status: draft
    description: Filter rows in tabular data according to a condition.

  - id: table.row.sort
    status: experimental
    description: Sort table rows by one or more columns with specified order.

  - id: task.approval.approve
    status: draft
    description: Approve a pending approval request.

  - id: task.approval.reject
    status: draft
    description: Reject a pending approval request with a reason.

  - id: task.assignee.assign
    status: draft
    description: Assign a task to a user or team.

  - id: task.case.close
    status: draft
    description: Close a case or ticket with a resolution.

  - id: task.case.create
    status: draft
    description: Create a new case or ticket.

  - id: task.case.get
    status: draft
    description: Retrieve a specific case by identifier.

  - id: task.case.list
    status: draft
    description: List cases, optionally filtered by status or assignee.

  - id: task.case.search
    status: draft
    description: Search cases by keyword or criteria.

  - id: task.case.update
    status: draft
    description: Update fields of an existing case.

  - id: task.event.acknowledge
    status: draft
    description: Acknowledge receipt of a task-related event.

  - id: task.incident.create
    status: draft
    description: Create a new incident ticket with severity and affected system information.

  - id: task.milestone.schedule
    status: draft
    description: Schedule a project milestone with a target date and deliverables.

  - id: task.priority.classify
    status: draft
    description: Classify the priority of a task based on its attributes and context.

  - id: task.sla.monitor
    status: draft
    description: Monitor SLA compliance for a set of tasks and raise alerts for breaches.

  - id: task.state.transition
    status: draft
    description: Transition a task to a new state, validating the transition is allowed.

  - id: text.content.classify
    status: draft
    description: Classify a text into one or more predefined categories.

  - id: text.content.embed
    status: draft
    description: Generate vector embeddings from text.

  - id: text.content.generate
    status: experimental
    description: Generate new text from an instruction and optional context.

  - id: text.entity.extract
    status: draft
    description: Extract named entities from a text block.

  - id: text.content.extract
    status: draft
    description: Extract relevant text content from an input text block.

  - id: text.keyword.extract
    status: draft
    description: Extract keywords from a text block.

  - id: text.language.detect
    status: draft
    description: Detect the language of a text.

  - id: text.content.merge
    status: stable
    description: Merge multiple text items into a single consolidated text block. Accepts an array of items with text content and produces a single string with configurable separator. Deterministic, no LLM required.

  - id: text.response.extract
    status: experimental
    description: Extract an answer to a question from a context passage.

  - id: text.content.transform
    status: experimental
    description: Transform existing text applying a directive.

  - id: text.content.summarize
    status: draft
    description: Produce a condensed version of text preserving key ideas.

  - id: text.content.template
    status: draft
    description: Render a text template using variables.

  - id: text.content.translate
    status: draft
    description: Translate text from one language to another.

  - id: video.frame.extract
    status: draft
    description: Extract frames from a video.

  - id: web.page.fetch
    status: experimental
    description: Fetch content from a web URL.

  - id: web.page.extract
    status: experimental
    description: Extract main textual content from a web page.

  - id: web.source.normalize
    status: experimental
    description: Normalize web search results into corpus item format suitable for downstream research and analysis capabilities. Converts raw search result objects (url, title, snippet) into structured corpus items with source_ref for lazy content resolution. Supports quick mode (snippet as content) and deep mode (source_ref for full page fetch).


  - id: web.source.search
    status: experimental
    description: Search the web for sources matching a query.

  - id: web.source.verify
    status: experimental
    description: Verify trust and integrity signals for a web source URL.

  # ── Control-flow primitives ──

  - id: agent.flow.branch
    status: experimental
    description: Evaluate a condition against the current context and select which execution branch to follow. Primary control-flow primitive for conditional workflows.

  - id: agent.flow.iterate
    status: experimental
    description: Iterate over a collection of items, invoking a specified capability or sub-pipeline for each element. Supports sequential and parallel execution modes.

  - id: agent.flow.wait
    status: experimental
    description: Pause workflow execution until an external condition is met or a timeout expires. Used for human-in-the-loop approvals, external event arrival, or timed delays.

  - id: agent.flow.catch
    status: experimental
    description: Handle an error from a prior workflow step by selecting and applying a fallback strategy. Supports retry, skip, default value substitution, and escalation.

  # ── Data composition primitives ──

  - id: data.array.map
    status: experimental
    description: Apply a transformation expression to each element of an input array, producing a new array of the same length with transformed elements.

  - id: data.field.map
    status: experimental
    description: Rename, alias, or restructure fields in a record according to a field mapping. Canonical adapter for resolving field-name mismatches between capability outputs and inputs.

  - id: data.record.join
    status: experimental
    description: Join records from two sources by a shared key field, producing a merged result set. Supports inner, left, right, and full join modes.

  - id: data.record.merge
    status: experimental
    description: Deep-merge multiple structured records into a single unified record. Configurable conflict resolution. Useful for aggregating partial results from parallel workflow steps.

  # ── Messaging and formatting ──

  - id: message.content.format
    status: experimental
    description: Format structured data into human-readable message text suitable for notifications, emails, or reports. Bridges structured capability outputs and text-consuming notification steps.

  # ── HTTP and external integration ──

  - id: web.request.send
    status: experimental
    description: Send a generic HTTP request to an API endpoint and return the response. Supports GET, POST, PUT, PATCH, DELETE.

  # ── Document generation ──

  - id: doc.content.generate
    status: experimental
    description: Generate a formatted document from an instruction and optional structured sections. Produces markdown, HTML, or plain text.

  # ── Scheduling ──

  - id: task.event.schedule
    status: experimental
    description: Schedule a future event, reminder, or recurring timer with optional attendee notifications.

  # ── User interaction ──

  - id: agent.input.collect
    status: experimental
    description: Collect structured input from a user or external source by specifying required fields, types, and validation constraints.

  # ── Image generation ──

  - id: image.content.generate
    status: experimental
    description: Generate an image from a textual description or prompt with style and size configuration.

  # ── Spreadsheet operations ──

  - id: table.sheet.read
    status: experimental
    description: Read data from a spreadsheet file (CSV, Excel) into structured row objects with column headers.

  - id: table.sheet.write
    status: experimental
    description: Write tabular data to a spreadsheet file (CSV, Excel) from structured row objects.

  # ── Text analysis extensions ──

  - id: text.content.compare
    status: experimental
    description: Compare two text blocks for semantic and structural similarity. Reports similarity score, specific differences, and a narrative summary.

  - id: text.sentiment.analyze
    status: experimental
    description: Analyze the sentiment and emotional tone of text. Returns polarity classification, numeric score, and dimensional breakdown.

  # ── Audio extensions ──

  - id: audio.speaker.diarize
    status: experimental
    description: Identify and separate speakers in a multi-speaker audio recording. Returns time-stamped segments with speaker identifiers.
