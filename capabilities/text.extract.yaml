id: text.extract
version: 1.0.0
description: Extract relevant text content from an input text block.

inputs:
  text:
    type: string
    required: true
    description: Source text to process.

outputs:
  text:
    type: string
    required: true
    description: Extracted or cleaned text content.

properties:
  deterministic: true
  side_effects: false
  idempotent: true