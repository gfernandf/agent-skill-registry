id: perception.case.list
version: 1.0.0
description: List cases with optional filtering by status, assignee, or related criteria.
  Provides consistent case inventory outputs for routing, triage, and workload-planning
  capabilities.
inputs:
  status_filter:
    type: string
    required: false
    description: Filter by case status (open, closed, in_progress).
  assignee_filter:
    type: string
    required: false
    description: Filter by assignee identifier.
outputs:
  cases:
    type: array
    required: true
    description: 'List of case objects. Schema: array of items with a stable item
      structure expected by downstream consumers.'
  total:
    type: number
    required: true
    description: Total cases returned.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - task
  - case
  - listing
  examples:
  - summary: List cases filtered by status
    inputs:
      status_filter: open
    outputs:
      cases:
      - id: CASE-1
        state: open
      total: 1
  layer: operational
cognitive_hints:
  role: perceive
  produces:
    cases:
      type: Entity
    total:
      type: Entity
  consumes:
  - Entity
