id: web.page.fetch
version: 1.0.0
description: Fetch content from a web URL.

inputs:
  url:
    type: string
    required: true
    description: URL to retrieve.

outputs:
  content:
    type: string
    required: true
    description: Retrieved web page content.

cognitive_hints:
  role: perceive
  produces:
    content:
      type: Artifact

properties:
  deterministic: false
  side_effects: false
  idempotent: true