id: data.record.deduplicate
version: 1.0.0
description: Deduplicate structured records using key fields.
inputs:
  records:
    type: array
    required: true
    description: Input records.
  key_fields:
    type: array
    required: false
    description: Optional key fields used to identify duplicates.
outputs:
  records:
    type: array
    required: true
    description: Deduplicated records.
  duplicates:
    type: integer
    required: false
    description: Number of removed duplicates.

cognitive_hints:
  role: act
  consumes:
    - Entity
  produces:
    records:
      type: Entity

properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: stable
  tags: [data, processing, deduplication]
  examples:
    - summary: "Remove duplicate records by key"
      inputs:
        records: [{id: 1, name: "Alice"}, {id: 1, name: "Alice"}]
        key_fields: ["id"]
      outputs:
        records: [{id: 1, name: "Alice"}]