id: email.message.send
version: 1.0.0
description: Send an email message.
inputs:
  to:
    type: string
    required: true
    description: Recipient email address.
  subject:
    type: string
    required: true
    description: Email subject.
  body:
    type: string
    required: true
    description: Email body.
  target_tenant_id:
    type: string
    required: false
    description: Optional target tenant identifier for same_tenant enforcement.
outputs:
  sent:
    type: boolean
    required: true
    description: Whether sending succeeded.
cognitive_hints:
  role: act
  consumes:
  - Message
  produces:
    sent:
      type: Artifact
safety:
  trust_level: elevated
  data_classification: pii
  reversible: false
  requires_confirmation: true
  allowed_targets:
  - internal_only
  - same_tenant
  mandatory_pre_gates:
  - capability: security.pii.detect
    on_fail: block
properties:
  deterministic: true
  side_effects: true
  idempotent: true
  state_access: write
  audit_level: strict
metadata:
  status: stable
  tags:
  - email
  - messaging
  - sending
  examples:
  - summary: Send an email message
    inputs:
      to: bob@example.com
      subject: Follow-up
      body: Please review the proposal.
      target_tenant_id: tenant-acme
    outputs:
      sent: true
      message_id: msg-001
  layer: operational
