id: email.message.send
version: 1.0.0
description: Send an email message.
inputs:
  to:
    type: string
    required: true
    description: Recipient email address.
  subject:
    type: string
    required: true
    description: Email subject.
  body:
    type: string
    required: true
    description: Email body.
outputs:
  sent:
    type: boolean
    required: true
    description: Whether sending succeeded.

cognitive_hints:
  role: act
  consumes:
    - Message
  produces:
    sent:
      type: Artifact

safety:
  trust_level: elevated
  data_classification: pii
  reversible: false
  requires_confirmation: true
  allowed_targets:
    - internal_only
  mandatory_pre_gates:
    - capability: security.pii.detect
      on_fail: block

properties:
  deterministic: true
  side_effects: true
  idempotent: true


metadata:
  status: experimental
  tags: [email, messaging, sending]
  examples:
    - summary: "Send an email message"
      inputs:
        to: "bob@example.com"
        subject: "Follow-up"
        body: "Please review the proposal."
      outputs:
        sent: true
        message_id: "msg-001"