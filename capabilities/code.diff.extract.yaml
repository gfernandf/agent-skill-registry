id: code.diff.extract
version: 1.0.0
description: Extract differences between two code versions.
inputs:
  code_a:
    type: string
    required: true
    description: First code version.
  code_b:
    type: string
    required: true
    description: Second code version.
outputs:
  diff:
    type: string
    required: true
    description: Computed code diff.
properties:
  deterministic: true
  side_effects: false
  idempotent: true


metadata:
  status: experimental
  tags: [code, developer-tools, extraction]
  examples:
    - summary: "Extract diff between two code versions"
      inputs:
        code_a: "x = 5"
        code_b: "x = 10"
      outputs:
        changes: [{type: "modified", before: "x = 5", after: "x = 10"}]

cognitive_hints:
  role: perceive
  produces:
    diff:
      type: Entity
  consumes:
  - Artifact
