id: data.schema.validate
version: 1.0.0
description: Validate structured data against a schema.
inputs:
  data:
    type: object
    required: true
    description: Structured data.
  schema:
    type: object
    required: true
    description: Validation schema.
outputs:
  valid:
    type: boolean
    required: true
    description: Whether validation passed.
  errors:
    type: array
    required: false
    description: Validation errors, if any.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - data
  - processing
  - validation
  examples:
  - summary: Validate data against a JSON schema
    inputs:
      data:
        name: John
      schema:
        type: object
        required:
        - name
    outputs:
      valid: true
  layer: operational
cognitive_hints:
  role: evaluate
  produces:
    valid:
      type: Score
    errors:
      type: Score
  consumes:
  - Entity
safety:
  trust_level: standard
  reversible: false
  requires_confirmation: false
  allowed_targets:
  - same_tenant
