id: reasoning.content.template
version: 1.0.0
description: Render a text template using named variables and deterministic substitution
  rules. Produces a normalized rendered artifact suitable for notifications, prompts,
  and reports.
inputs:
  template:
    type: string
    required: true
    description: Template string with placeholders using double-brace syntax.
  variables:
    type: object
    required: true
    description: 'Object mapping placeholder names to replacement values. Schema:
      object with stable keys expected by downstream consumers; additional keys are
      optional unless otherwise specified.'
outputs:
  text:
    type: string
    required: true
    description: Rendered text after applying variables to the template.
properties:
  deterministic: true
  side_effects: false
  idempotent: true
  state_access: none
  audit_level: standard
metadata:
  status: stable
  tags:
  - text
  - template
  - utility
  examples:
  - summary: Render a template with variables
    inputs:
      template: Hello {{name}}, welcome to {{place}}!
      variables:
        name: Alice
        place: HQ
    outputs:
      text: Hello Alice, welcome to HQ!
  layer: cognitive
cognitive_hints:
  role: act
  produces:
    text:
      type: Artifact
  consumes:
  - Context
