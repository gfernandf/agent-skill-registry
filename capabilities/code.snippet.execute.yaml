id: code.snippet.execute
version: 1.0.0
description: Execute a code snippet.
inputs:
  code:
    type: string
    required: true
    description: Code to execute.
  language:
    type: string
    required: true
    description: Programming language.
outputs:
  result:
    type: object
    required: false
    description: Structured execution result.
  stdout:
    type: string
    required: false
    description: Standard output.
  stderr:
    type: string
    required: false
    description: Standard error.

safety:
  trust_level: privileged
  data_classification: internal
  reversible: false
  requires_confirmation: true
  scope_constraints:
    - sandboxed_execution

properties:
  deterministic: false
  side_effects: true
  idempotent: true


metadata:
  status: stable
  tags: [code, developer-tools, execution, sandbox]
  examples:
    - summary: "Execute a Python expression"
      inputs:
        code: "print(2 + 3)"
        language: "python"
      outputs:
        stdout: "5
"
        exit_code: 0

cognitive_hints:
  role: act
  produces:
    result:
      type: Artifact
    stdout:
      type: Artifact
    stderr:
      type: Artifact
  consumes:
  - Artifact
