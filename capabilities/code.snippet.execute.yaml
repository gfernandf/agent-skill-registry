id: code.snippet.execute
version: 1.0.0
description: Execute a code snippet.
inputs:
  code:
    type: string
    required: true
    description: Code to execute.
  language:
    type: string
    required: true
    description: Programming language.
outputs:
  result:
    type: object
    required: false
    description: Structured execution result.
  stdout:
    type: string
    required: false
    description: Standard output.
  stderr:
    type: string
    required: false
    description: Standard error.
properties:
  deterministic: false
  side_effects: true
  idempotent: true
