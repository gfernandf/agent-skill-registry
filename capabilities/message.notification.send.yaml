id: message.notification.send
version: 1.0.0
description: Send a generic message.
inputs:
  recipient:
    type: string
    required: true
    description: Message recipient.
  message:
    type: string
    required: true
    description: Message body.
outputs:
  sent:
    type: boolean
    required: true
    description: Whether sending succeeded.

safety:
  trust_level: elevated
  data_classification: internal
  reversible: false
  requires_confirmation: true
  allowed_targets:
    - internal_only

properties:
  deterministic: true
  side_effects: true
  idempotent: true


metadata:
  status: experimental
  tags: [messaging, notification, sending]
  examples:
    - summary: "Send a notification message"
      inputs:
        message: "Build succeeded"
        recipient: "ops-channel"
      outputs:
        sent: true
        message_id: "notif-001"

cognitive_hints:
  role: act
  produces:
    sent:
      type: Score
  consumes:
  - Message
