id: reasoning.constraint.extract
version: 1.0.0
description: Extract hard and soft constraints from goals, context, and artifacts.
  Produces reusable constraint structures that support planning, option scoring, and
  feasibility checks.
inputs:
  target:
    type: object
    required: true
    description: 'Goal, plan, or draft artifact. Schema: object with stable keys expected
      by downstream consumers; additional keys are optional unless otherwise specified.'
  context:
    type: string
    required: false
    description: Optional domain context.
outputs:
  constraints:
    type: array
    required: true
    description: 'Constraints with id, statement, type(hard|soft), and source. Schema:
      array of items with a stable item structure expected by downstream consumers.'
  gaps:
    type: array
    required: false
    description: 'Missing or underspecified constraints. Schema: array of items with
      a stable item structure expected by downstream consumers.'
  status:
    type: string
    required: true
    description: Execution outcome status for downstream routing (ok | partial | error).
  trace_ref:
    type: string
    required: false
    description: Optional trace or correlation reference for audit and observability.
cognitive_hints:
  role: analyze
  consumes:
  - Artifact
  - Context
  produces:
    constraints:
      type: Criterion
    gaps:
      type: Uncertainty
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: standard
metadata:
  status: stable
  tags:
  - constraint
  - analysis
  - reasoning
  examples:
  - summary: Extract deployment constraints
    inputs:
      target:
        objective: Deploy in EU
        constraints:
        - Budget under 2M EUR
  layer: cognitive
