id: memory.vector.search
version: 1.0.0
description: Search memory records by vector similarity against a query embedding.
  Returns semantically related memory candidates to support retrieval-augmented reasoning
  and context reconstruction flows.
inputs:
  query:
    type: string
    required: true
    description: The search query text.
  namespace:
    type: string
    required: false
    description: Optional namespace to scope the search.
  top_k:
    type: number
    required: false
    description: Maximum number of results to return. Defaults to 5.
outputs:
  results:
    type: array
    required: true
    description: 'Ranked search results with record, score, and optional metadata.
      Schema: array of items with a stable item structure expected by downstream consumers.'
  total_searched:
    type: number
    required: true
    description: Total number of records searched.
properties:
  deterministic: false
  side_effects: false
  idempotent: true
  state_access: read
  audit_level: basic
metadata:
  status: stable
  tags:
  - memory
  - vector
  - search
  - similarity
  examples:
  - summary: Search memory by semantic similarity
    inputs:
      query: deployment strategy
      top_k: 3
    outputs:
      results:
      - id: r1
        score: 0.89
        content: Use blue-green deployment.
  layer: operational
cognitive_hints:
  role: perceive
  produces:
    results:
      type: Entity
    total_searched:
      type: Entity
  consumes:
  - Entity
